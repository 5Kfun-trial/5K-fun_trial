<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON SHOOTING GAME - TIGHT BALANCE</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        /* ==================================================
           Root
           ================================================== */
        :root {
            --bg-color: #010402;
            --text-color: #33ff66;
            --accent-color: #ff0055;
            --neon-blue: #00f0ff;
            --neon-yellow: #ffff00;
        }

        /* ==================================================
           Layout
           ================================================== */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        body {
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top, 5px);
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 15px);
            padding-left: 10px;
            padding-right: 10px;
        }

        /* 走査線風のスキャンラインオーバーレイ演出 */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            z-index: 9999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* ==================================================
           Header
           ================================================== */
        header {
            text-align: center;
            width: 100%;
            max-width: 400px;
            flex-shrink: 0;
            padding: 2px 0;
        }

        h1 {
            margin: 2px 0;
            font-size: 1.3rem;
            font-weight: 900;
            text-shadow: 0 0 10px var(--text-color);
            letter-spacing: 1px;
        }

        .status-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            padding: 4px 10px;
            font-size: 0.8rem;
            border: 2px solid var(--text-color);
            background: #000;
            box-shadow: 0 0 15px rgba(51, 255, 102, 0.2);
        }

        /* ==================================================
           Game Area
           ================================================== */
        #game-area {
            position: relative;
            width: 100%;
            max-width: 400px;
            flex-grow: 1;
            flex-shrink: 1;
            min-height: 200px;
            margin: 5px 0;
            border: 3px solid var(--text-color);
            background-color: #000;
            overflow: hidden;
            box-sizing: border-box;
            box-shadow: 0 0 25px rgba(51, 255, 102, 0.4);
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 4, 2, 0.88);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay h2 {
            font-size: 1.8rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-shadow: 0 0 12px var(--accent-color);
            letter-spacing: 2px;
        }

        .overlay p { margin: 5px 0; font-size: 0.95rem; }

        /* ==================================================
           Footer / Score Board
           ================================================== */
        footer {
            width: 100%;
            max-width: 400px;
            text-align: center;
            flex-shrink: 0;
        }

        /* スタート・リトライ・戻るボタンのコンテナ（縦並びに対応） */
        .action-button-container {
            width: 100%;
            height: auto;
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px; /* ボタン間の余白 */
        }

        .score-board-container {
            display: flex;
            justify-content: space-between;
            width: 95%;
            margin: 0 auto 8px auto;
            font-size: 0.75rem;
            border-top: 1px dashed rgba(51, 255, 102, 0.3);
            padding-top: 6px;
            text-align: left;
        }

        .hi-score-box { width: 45%; color: #fff; text-shadow: 0 0 5px #fff; }
        .hi-score-box span { color: var(--text-color); font-size: 1.1rem; font-weight: bold; display: block; }

        .history-box {
            width: 50%; text-align: right; max-height: 44px;
            overflow-y: auto; font-family: monospace; font-size: 0.7rem; color: #8cba94; line-height: 1.2;
        }
        .history-box::-webkit-scrollbar { width: 3px; }
        .history-box::-webkit-scrollbar-thumb { background: var(--text-color); }

        .controls { display: flex; justify-content: space-around; width: 85%; margin: 0 auto; }

        /* ==================================================
           Buttons
           ================================================== */
        .btn-action {
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 6px 30px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(51, 255, 102, 0.4);
        }

        .btn-action:hover, .btn-action:active {
            background-color: var(--text-color);
            color: #000;
            box-shadow: 0 0 20px var(--text-color);
        }

        /* 操作ボタン：テーマ色（ネオングリーン）に合わせて統一・リデザイン */
        .btn-touch {
            width: 58px;
            height: 58px;
            font-size: 1.4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            touch-action: manipulation;
            background: rgba(51, 255, 102, 0.15);
            box-shadow: 0 0 12px rgba(51, 255, 102, 0.3);
            color: var(--text-color);
            border: 2px solid var(--text-color);
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        /* 触った（ホバー、クリック、タップしている間）ときに背景が緑に塗りつぶされ、矢印が黒になるスタイル */
        .btn-touch:hover, .btn-touch:active, .btn-touch.touch-active {
            background: var(--text-color) !important;
            color: #000 !important;
            box-shadow: 0 0 25px var(--text-color) !important;
            text-shadow: none !important;
        }

        /* ==================================================
           Responsive
           ================================================== */
        /* 現状、追加のメディアクエリは定義されていません。
           レイアウトは max-width:400px を基準にしたフレックス構成で
           スマートフォン〜タブレット幅まで自然に収まる設計です。
           今後ブレークポイント対応が必要になった場合はここに追記してください。 */
    </style>
</head>
<body>

    <header>
        <h1>NEON HIGHWAY STG</h1>
        <div class="status-container">
            <div>SCORE: <span id="score">0</span></div>
            <div>POWER: <span id="power-level">LV.1</span></div>
        </div>
    </header>

    <div id="game-area">
        <canvas id="game-canvas"></canvas>

        <div id="start-overlay" class="overlay">
            <h2>GALAXY SHOOTER</h2>
            <p>TACTICAL RE-BALANCE EDITION</p>
            <p style="color:var(--neon-blue); font-size:0.8rem; margin-top:5px;">PC: [←][→] / SMARTPHONE: TOUCH BUTTON</p>
        </div>

        <div id="gameover-overlay" class="overlay" style="display: none;">
            <h2>MISSION FAILED</h2>
            <p>FINAL SCORE: <span id="final-score">0</span></p>
        </div>
    </div>

    <footer>
        <div class="action-button-container">
            <button id="start-btn" class="btn-action">LAUNCH MISSION</button>
            <button id="retry-btn" class="btn-action" style="display: none;">REDEPLOY</button>
            <button id="back-btn" class="btn-action">Back</button>
        </div>

        <div class="score-board-container">
            <div class="hi-score-box">
                🏆 TOP PILOT
                <span id="hi-score-display">0</span>
            </div>
            <div class="history-box" id="history-display">
                MISSION HISTORY<br>- NO RECORD -
            </div>
        </div>

        <div class="controls">
            <button id="btn-left" class="btn-touch">◀</button>
            <button id="btn-right" class="btn-touch">▶</button>
        </div>
    </footer>

    <script>
    (function () {
        'use strict';

        /*****************************************************************
         * 定数
         *****************************************************************/

        // --- 画面・座標系 ---
        const V_WIDTH = 400;
        const V_HEIGHT = 500;
        const PLAYER_Y = V_HEIGHT - 40;
        const OFFSCREEN_Y = 9999; // 「撃破済み/回収済み」を示す退避用のY座標

        // --- 色定義 ---
        // 注意: Canvas 2D の fillStyle / shadowColor には CSS の var(--xxx) を
        // 直接指定することはできません（CSSカスタムプロパティはCanvas上では解決されず、
        // 無効な値として無視され「直前に設定した色が残ったまま」になってしまいます）。
        // これが敵・弾・プレイヤーの色が正しく表示されない描画崩れの根本原因でした。
        // そのため :root の値と同じ色をJS側の定数として明示的に持たせています。
        const COLOR_TEXT = "#33ff66";      // --text-color
        const COLOR_ACCENT = "#ff0055";    // --accent-color（敵弾・警告色）
        const COLOR_NEON_BLUE = "#00f0ff"; // --neon-blue
        const COLOR_NEON_YELLOW = "#ffff00"; // --neon-yellow
        const COLOR_WHITE = "#ffffff";
        const COLOR_STAR = "rgba(255, 255, 255, 0.4)";

        // --- プレイヤー ---
        const PLAYER_SPEED = 1.8;
        const PLAYER_HITBOX_BY_LEVEL = { 1: 12, 2: 18, 3: 24 }; // pItemsCollected別の当たり判定半径
        const SHOOT_COOLDOWN_MAX = 30;
        const INVINCIBILITY_DURATION = 60; // 被弾後の無敵時間（フレーム数）

        // --- 自機弾（P1/P2/P3で武装が変化） ---
        const BULLET_SPEED_NORMAL = 4;
        const BULLET_SPEED_FAST = 5.5;
        const BULLET_DMG_NORMAL = 1;
        const BULLET_DMG_HEAVY = 2;

        // --- 敵 ---
        // 出現率(0-100の乱数)としきい値、種類ごとのHP・サイズ・撃破スコアの対応表
        const ENEMY_TYPES = {
            '〇': { hp: 1, size: 14, score: 10, label: '〇10点', color: COLOR_TEXT },
            '▽': { hp: 3, size: 16, score: 30, label: '▽30点', color: COLOR_NEON_BLUE },
            '□': { hp: 4, size: 18, score: 40, label: '□40点', color: COLOR_NEON_YELLOW },
            '☆': { hp: 5, size: 20, score: 50, label: '☆50点', color: COLOR_ACCENT }
        };
        // 出現率の乱数しきい値（各タイプが「解禁」されている場合にのみ判定される）
        const ENEMY_SPAWN_THRESHOLDS = [
            { min: 85, type: '☆' },
            { min: 65, type: '□' },
            { min: 40, type: '▽' }
            // 上記いずれにも該当しない、または未解禁の場合は '〇'
        ];

        // --- 敵編成のスコア基準（現在スコアに応じて出現する敵の種類が変化） ---
        // ・スコア300点で ▽ が解禁 → 〇▽の2種
        // ・スコア600点で □ が解禁 → 〇▽□の3種
        // ・スコア1000点で ☆ が解禁 → 〇▽□☆の4種（それまでは〇のみ）
        // ・スコアが下がって基準を下回った場合は、対応するタイプの出現も止まる
        const ENEMY_UNLOCK_SCORE_TRIANGLE = 300; // ▽ 解禁スコア
        const ENEMY_UNLOCK_SCORE_SQUARE = 600;   // □ 解禁スコア
        const ENEMY_UNLOCK_SCORE_STAR = 1000;    // ☆ 解禁スコア

        // --- 難易度スケーリング ---
        // ☆解禁(1000点)までは基本難易度(レベル0)。以降はスコア500点増えるごとに
        // 難易度レベルが+1され、敵の移動速度・弾速がさらに上昇する。
        // スコアが下がれば難易度レベルも即座に下がる（レベルは常に現在スコアから算出）。
        const DIFFICULTY_RAMP_START_SCORE = ENEMY_UNLOCK_SCORE_STAR; // 1000
        const DIFFICULTY_RAMP_SCORE_STEP = 500;
        const DIFFICULTY_ENEMY_SPEED_STEP = 0.15;   // 敵の移動速度が難易度レベル1につき+15%（スピード感は維持）
        const DIFFICULTY_BULLET_SPEED_STEP = 0.12;  // 敵弾の速度が難易度レベル1につき+12%（スピード感は維持）
        // ★出現間隔を全体的に長めに調整（敵の物量を抑える）
        const ENEMY_SPAWN_COOLDOWN_BASE = 190;
        const ENEMY_SPAWN_COOLDOWN_SCORE_DIVISOR = 14;
        const ENEMY_SPAWN_COOLDOWN_FLOOR_BASE = 65;
        const ENEMY_SPAWN_COOLDOWN_FLOOR_STEP = 3;
        const ENEMY_SPAWN_COOLDOWN_FLOOR_MIN = 45;

        // --- 猛攻フェーズ（スコア2000点超）---
        // 敵4種すべてが左右に動きながら攻撃するようになる代わりに、
        // Pアイテムの出現率が1/2まで上昇する。スコアが2000以下に戻れば通常仕様に戻る。
        const RAMPAGE_SCORE_THRESHOLD = 2000;
        const ENEMY_HORIZONTAL_SPEED = 1.2; // 猛攻フェーズ中の左右移動速度
        const ENEMY_HORIZONTAL_MARGIN = 20; // 左右移動の折り返し余白

        const ENEMY_HIT_PADDING = 8;       // 自機弾と敵の当たり判定の余白
        const ENEMY_ESCAPE_LINE = V_HEIGHT - 5; // このYを超えると「取り逃し」扱い
        const ENEMY_MISS_PENALTY = 50;     // 取り逃し時の減点
        // ★攻撃頻度・攻撃確率を抑える（弾の物量を減らす）
        const ENEMY_SHOOT_COOLDOWN_MAX = 80;
        const ENEMY_SHOOT_CHANCE = 0.10;   // 敵が弾を撃つ確率（猛攻フェーズ前は〇を除く）
        const ENEMY_BULLET_BASE_SPEED = 2.25;
        const ENEMY_BULLET_CHAR = "！";     // ★敵弾の表示文字（旧: "l"）

        // --- Pアイテム ---
        const ITEM_DROP_RATE = 0.10;        // 通常時の生成率（現状維持）
        const ITEM_DROP_RATE_RAMPAGE = 0.5; // 猛攻フェーズ中（スコア2000点超）の生成率（1/2）
        const ITEM_FALL_SPEED = 1.0;
        const ITEM_PICKUP_MARGIN = 12; // 自機の当たり判定半径に加算する取得判定の余白
        const ITEM_MAX_LEVEL_BONUS_SCORE = 50; // LV.MAX状態でPアイテムを取得した際のボーナス

        // --- 演出（爆発パーティクル・スコア表示） ---
        const PARTICLE_COUNT_MIN = 5;
        const PARTICLE_COUNT_RANGE = 3;
        const PARTICLE_SPEED_MIN = 0.8;
        const PARTICLE_SPEED_RANGE = 1.5;
        const PARTICLE_LIFE_MIN = 25;
        const PARTICLE_LIFE_RANGE = 15;
        const SCORE_EFFECT_LIFE_KILL = 35;
        const SCORE_EFFECT_LIFE_SCORE_CHANGE = 45;

        // --- 星空背景 ---
        const STAR_COUNT = 40;

        // --- スコア履歴 ---
        const MAX_SCORE_HISTORY = 10;


        /*****************************************************************
         * ゲーム状態
         *****************************************************************/

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        let animationFrameId = null;
        let isPlaying = false;
        let score = 0;

        let playerX = V_WIDTH / 2;
        let moveDirection = 0; // タッチボタン用の移動方向（-1, 0, 1）

        let pItemsCollected = 1; // 現在のパワーレベル（1〜3）

        let enemies = [];
        let bullets = [];       // 自機弾
        let enemyBullets = [];  // 敵弾
        let items = [];         // Pアイテム
        let stars = [];
        let scoreEffects = [];  // 加点/減点のポップアップ演出
        let particles = [];     // 爆発パーティクル

        let shootCooldown = 0;
        let enemySpawnCooldown = 0;
        let enemyShootCooldown = 0;
        let invincibilityTimer = 0; // 無敵時間タイマー（残りフレーム数）

        let keys = {};

        let hiScore = parseInt(localStorage.getItem('stg_hi_score')) || 0;
        let scoreHistory = JSON.parse(localStorage.getItem('stg_history')) || [];

        // --- DOM参照 ---
        const scoreEl = document.getElementById('score');
        const powerLevelEl = document.getElementById('power-level');
        const startOverlay = document.getElementById('start-overlay');
        const gameoverOverlay = document.getElementById('gameover-overlay');
        const finalScoreEl = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');
        const backBtn = document.getElementById('back-btn');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const hiScoreDisplay = document.getElementById('hi-score-display');
        const historyDisplay = document.getElementById('history-display');


        /*****************************************************************
         * 初期化
         *****************************************************************/

        function resizeCanvas() {
            canvas.width = V_WIDTH;
            canvas.height = V_HEIGHT;
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * V_WIDTH,
                    y: Math.random() * V_HEIGHT,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.75 + 0.25
                });
            }
        }

        function initGame() {
            score = 0;
            playerX = V_WIDTH / 2;
            pItemsCollected = 1;
            enemies = [];
            bullets = [];
            enemyBullets = [];
            items = [];
            scoreEffects = [];
            particles = [];
            shootCooldown = 0;
            enemySpawnCooldown = 0;
            enemyShootCooldown = 0;
            invincibilityTimer = 0; // 無敵時間リセット

            initStars();
            loadAndRenderScoreBoard();
            updateStatus();
        }

        function loadAndRenderScoreBoard() {
            hiScoreDisplay.textContent = hiScore;
            if (scoreHistory.length === 0) {
                historyDisplay.innerHTML = "MISSION HISTORY<br>No log standard.";
            } else {
                let html = "MISSION HISTORY<br>";
                scoreHistory.forEach((s, idx) => { html += `#${idx + 1}: ${s}pts<br>`; });
                historyDisplay.innerHTML = html;
            }
        }


        /*****************************************************************
         * 敵生成
         *****************************************************************/

        // 現在のスコアから難易度レベル（1000点ごとに+1）を算出
        function getDifficultyLevel() {
            return Math.floor(score / DIFFICULTY_SCORE_STEP);
        }

        // 敵の種類はスコアに応じて解禁され（getAvailableEnemyTypes）、
        // 解禁済みタイプの中から出現率の乱数で1体選ばれる（pickEnemyType）
        // 現在のスコアから難易度レベルを算出する。
        // ☆解禁(1000点)未満は常にレベル0。以降はスコア500点ごとに+1され、
        // スコアが下がれば自動的にレベルも下がる（常に現在スコアから再計算するため）。
        function getDifficultyLevel() {
            if (score < DIFFICULTY_RAMP_START_SCORE) return 0;
            return 1 + Math.floor((score - DIFFICULTY_RAMP_START_SCORE) / DIFFICULTY_RAMP_SCORE_STEP);
        }

        // 現在のスコアに応じて、出現しうる敵タイプの一覧を返す
        // （〇は常に出現。▽/□/☆はそれぞれの解禁スコアに達すると出現し、
        //   スコアが下がって解禁スコアを下回れば出現しなくなる）
        function getAvailableEnemyTypes() {
            const types = ['〇'];
            if (score >= ENEMY_UNLOCK_SCORE_TRIANGLE) types.push('▽');
            if (score >= ENEMY_UNLOCK_SCORE_SQUARE) types.push('□');
            if (score >= ENEMY_UNLOCK_SCORE_STAR) types.push('☆');
            return types;
        }

        function pickEnemyType() {
            const available = getAvailableEnemyTypes();
            const rand = Math.random() * 100;
            for (const entry of ENEMY_SPAWN_THRESHOLDS) {
                if (rand > entry.min && available.includes(entry.type)) return entry.type;
            }
            return '〇';
        }

        // 現在スコアが猛攻フェーズ（2000点超）かどうか
        function isRampagePhase() {
            return score > RAMPAGE_SCORE_THRESHOLD;
        }

        function spawnEnemy() {
            const type = pickEnemyType();
            const def = ENEMY_TYPES[type];

            // 難易度レベルに応じて移動速度が段階的に上昇（レベル1につき+15%）
            const speedMultiplier = 1.0 + (getDifficultyLevel() * DIFFICULTY_ENEMY_SPEED_STEP);

            enemies.push({
                x: Math.random() * (V_WIDTH - 40) + 20,
                y: -20,
                type: type,
                hp: def.hp,
                size: def.size,
                speed: (Math.random() * 0.4 + 0.6) * speedMultiplier,
                hDir: Math.random() < 0.5 ? -1 : 1 // 猛攻フェーズでの左右移動の初期方向
            });
        }


        /*****************************************************************
         * プレイヤー
         *****************************************************************/

        // 攻撃設定：P1=・ / P2=l l / P3=I・I
        function fireAutoShot() {
            if (pItemsCollected === 1) {
                // P1つ：・攻撃（ダメージ1）
                bullets.push({ x: playerX, y: PLAYER_Y - 10, type: '・', speed: BULLET_SPEED_NORMAL, dmg: BULLET_DMG_NORMAL });
            } else if (pItemsCollected === 2) {
                // P2つ：l l 攻撃（2発並列、ダメージ各1）
                bullets.push({ x: playerX - 8, y: PLAYER_Y - 15, type: 'l', speed: BULLET_SPEED_FAST, dmg: BULLET_DMG_NORMAL });
                bullets.push({ x: playerX + 8, y: PLAYER_Y - 15, type: 'l', speed: BULLET_SPEED_FAST, dmg: BULLET_DMG_NORMAL });
            } else {
                // P3つ：I・I 攻撃（左にI/中央に・/右にI、ダメージ各2/各1/各2）
                bullets.push({ x: playerX, y: PLAYER_Y - 10, type: '・', speed: BULLET_SPEED_FAST, dmg: BULLET_DMG_NORMAL });
                bullets.push({ x: playerX - 16, y: PLAYER_Y - 15, type: 'I', speed: BULLET_SPEED_FAST, dmg: BULLET_DMG_HEAVY });
                bullets.push({ x: playerX + 16, y: PLAYER_Y - 15, type: 'I', speed: BULLET_SPEED_FAST, dmg: BULLET_DMG_HEAVY });
            }
        }

        function updatePlayerMovement() {
            if (keys["ArrowLeft"] || keys["Left"]) {
                playerX -= PLAYER_SPEED;
            } else if (keys["ArrowRight"] || keys["Right"]) {
                playerX += PLAYER_SPEED;
            } else {
                playerX += moveDirection * PLAYER_SPEED;
            }
            if (playerX < 15) playerX = 15;
            if (playerX > V_WIDTH - 15) playerX = V_WIDTH - 15;
        }

        function updatePlayerShooting() {
            shootCooldown--;
            if (shootCooldown <= 0) {
                fireAutoShot();
                shootCooldown = SHOOT_COOLDOWN_MAX;
            }
        }

        function updateInvincibility() {
            if (invincibilityTimer > 0) {
                invincibilityTimer--;
            }
        }

        function getPlayerHitboxRadius() {
            return PLAYER_HITBOX_BY_LEVEL[pItemsCollected] || PLAYER_HITBOX_BY_LEVEL[1];
        }


        /*****************************************************************
         * アイテム
         *****************************************************************/

        // 敵撃破時にのみ呼び出される、Pアイテムの生成抽選
        // ・通常時は生成率10%を維持。猛攻フェーズ（スコア2000点超）では1/2まで上昇する
        // ・敵の撃破位置(x, y)にそのまま生成し、画面外（Y座標が負）で
        //   生成されないようクランプすることで、画面内から自然に落下を開始させる
        function trySpawnItemAt(x, y) {
            const dropRate = isRampagePhase() ? ITEM_DROP_RATE_RAMPAGE : ITEM_DROP_RATE;
            if (Math.random() < dropRate) {
                const spawnY = Math.max(y, 0);
                items.push({ x: x, y: spawnY });
            }
        }

        function updateItemsPosition() {
            items.forEach(it => { it.y += ITEM_FALL_SPEED; });
        }

        // Pアイテムを画面下端を大きく超えたものだけ破棄する
        // （生成直後の処理と回収判定の両方の後、フレームの最後に一度だけ行えば十分なため
        //   以前あった重複したfilter呼び出しを1箇所に統合）
        function cleanupItems() {
            items = items.filter(it => it.y < V_HEIGHT + 20);
        }


        /*****************************************************************
         * 衝突判定
         *****************************************************************/

        // 画面下端まで到達してしまった敵＝取り逃し処理（減点）
        function checkEnemyEscape() {
            enemies.forEach(e => {
                if (e.y > ENEMY_ESCAPE_LINE) {
                    score -= ENEMY_MISS_PENALTY;
                    e.y = OFFSCREEN_Y;

                    scoreEffects.push({
                        x: e.x,
                        y: V_HEIGHT - 25,
                        text: `-${ENEMY_MISS_PENALTY}`,
                        color: COLOR_ACCENT,
                        size: 11,
                        life: SCORE_EFFECT_LIFE_SCORE_CHANGE
                    });
                }
            });
        }

        // 自機と敵弾／敵本体の当たり判定（無敵時間中はスキップ）
        function checkPlayerHit() {
            if (invincibilityTimer > 0) return;

            const playerHitboxRadius = getPlayerHitboxRadius();
            let hitThreatIndex = -1;
            let hitThreatType = null; // 'enemy' or 'bullet'

            // 敵の弾との接触判定
            for (let i = 0; i < enemyBullets.length; i++) {
                if (Math.hypot(enemyBullets[i].x - playerX, enemyBullets[i].y - PLAYER_Y) < (playerHitboxRadius + 4)) {
                    hitThreatType = 'bullet';
                    hitThreatIndex = i;
                    break;
                }
            }

            // 敵本体との接触判定（弾に当たっていなければチェック）
            if (hitThreatIndex === -1) {
                for (let i = 0; i < enemies.length; i++) {
                    if (Math.hypot(enemies[i].x - playerX, enemies[i].y - PLAYER_Y) < (enemies[i].size + playerHitboxRadius)) {
                        hitThreatType = 'enemy';
                        hitThreatIndex = i;
                        break;
                    }
                }
            }

            if (hitThreatIndex === -1) return;

            if (pItemsCollected > 1) {
                // パワーダウン：P3 -> P2 / P2 -> P1
                pItemsCollected--;
                invincibilityTimer = INVINCIBILITY_DURATION;
                createExplosion(playerX, PLAYER_Y);

                // 当たった敵または弾のみ消滅させ、多段ダメージを回避する
                if (hitThreatType === 'bullet') {
                    enemyBullets.splice(hitThreatIndex, 1);
                } else {
                    enemies.splice(hitThreatIndex, 1);
                }
            } else {
                // パワー1(P1)の時に当たるとゲームオーバー
                gameOver();
            }
        }

        // Pアイテムの回収判定
        function checkItemPickup() {
            const pickupRadius = getPlayerHitboxRadius() + ITEM_PICKUP_MARGIN;

            items.forEach(it => {
                if (Math.hypot(it.x - playerX, it.y - PLAYER_Y) < pickupRadius) {
                    if (pItemsCollected < 3) {
                        pItemsCollected++;
                    } else {
                        // LV.MAX状態で取得した場合はスコアボーナスに変換
                        score += ITEM_MAX_LEVEL_BONUS_SCORE;
                        scoreEffects.push({
                            x: it.x,
                            y: it.y,
                            text: `+${ITEM_MAX_LEVEL_BONUS_SCORE}`,
                            color: COLOR_ACCENT,
                            size: 12,
                            life: SCORE_EFFECT_LIFE_SCORE_CHANGE
                        });
                    }
                    it.y = OFFSCREEN_Y; // 回収済みとして退避（次のcleanupItemsで除去）
                }
            });
        }

        // 自機弾と敵の当たり判定・撃破処理
        // ・自機弾は命中した時点でその場では他の敵に再ヒットしない（b.yを退避させるため）
        // ・撃破済みの敵はy座標をOFFSCREENに退避するため、同一フレーム内で
        //   他の弾が同じ敵に重複ヒットして多重に得点・アイテム抽選されることはない
        function checkBulletEnemyCollisions() {
            bullets.forEach(b => {
                enemies.forEach(e => {
                    if (Math.hypot(b.x - e.x, b.y - e.y) >= (e.size + ENEMY_HIT_PADDING)) return;

                    e.hp -= b.dmg;
                    b.y = -OFFSCREEN_Y; // この弾は命中済みとして消費する

                    if (e.hp > 0) return;

                    handleEnemyDefeated(e);
                });
            });
        }

        // ------------------------------------------------------------
        // 敵撃破処理
        // ・爆発生成
        // ・スコア加算
        // ・Pアイテム抽選（敵撃破時のみ）
        // ------------------------------------------------------------
        function handleEnemyDefeated(e) {
            const defeatX = e.x;
            const defeatY = e.y;
            e.y = OFFSCREEN_Y; // 以後の当たり判定・描画対象から除外

            createExplosion(defeatX, defeatY);

            const def = ENEMY_TYPES[e.type];
            score += def.score;

            scoreEffects.push({
                x: defeatX,
                y: defeatY,
                text: def.label,
                color: COLOR_TEXT,
                size: 12,
                life: SCORE_EFFECT_LIFE_KILL
            });

            trySpawnItemAt(defeatX, defeatY);
        }


        /*****************************************************************
         * エフェクト
         *****************************************************************/

        function createExplosion(x, y) {
            const count = PARTICLE_COUNT_MIN + Math.floor(Math.random() * PARTICLE_COUNT_RANGE);
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * PARTICLE_SPEED_RANGE + PARTICLE_SPEED_MIN;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: PARTICLE_LIFE_MIN + Math.floor(Math.random() * PARTICLE_LIFE_RANGE)
                });
            }
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
            });
            particles = particles.filter(p => p.life > 0);
        }

        function updateScoreEffects() {
            scoreEffects.forEach(fx => {
                fx.y -= 0.5;
                fx.life--;
            });
            scoreEffects = scoreEffects.filter(fx => fx.life > 0);
        }


        /*****************************************************************
         * 描画
         *****************************************************************/

        function renderStars() {
            ctx.fillStyle = COLOR_STAR;
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function renderEnemyBullets() {
            ctx.shadowColor = COLOR_ACCENT;
            ctx.fillStyle = COLOR_ACCENT;
            ctx.font = "900 20px 'Courier New', sans-serif";
            enemyBullets.forEach(eb => {
                ctx.fillText(ENEMY_BULLET_CHAR, eb.x, eb.y);
            });
        }

        function renderPlayerBullets() {
            bullets.forEach(b => {
                if (b.type === 'I') {
                    ctx.shadowColor = COLOR_NEON_BLUE;
                    ctx.fillStyle = COLOR_NEON_BLUE;
                    ctx.font = "bold 22px Courier New";
                } else if (b.type === 'l') {
                    ctx.shadowColor = COLOR_NEON_BLUE;
                    ctx.fillStyle = COLOR_NEON_BLUE;
                    ctx.font = "bold 18px Courier New";
                } else { // '・'
                    ctx.shadowColor = COLOR_WHITE;
                    ctx.fillStyle = COLOR_WHITE;
                    ctx.font = "bold 14px Courier New";
                }
                ctx.fillText(b.type, b.x, b.y);
            });
        }

        function renderEnemies() {
            enemies.forEach(e => {
                const color = ENEMY_TYPES[e.type].color;
                ctx.shadowColor = color;
                ctx.fillStyle = color;
                ctx.font = `bold ${e.size + 4}px Courier New`;
                ctx.fillText(e.type, e.x, e.y);
            });
        }

        function renderItems() {
            // items専用のtextAlign/textBaselineが以降の描画に影響しないよう
            // save/restoreで設定範囲を明確に区切る
            ctx.save();
            ctx.font = "900 24px 'Courier New', sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.shadowColor = COLOR_NEON_YELLOW;
            ctx.shadowBlur = 12;
            ctx.fillStyle = COLOR_NEON_YELLOW;
            items.forEach(it => {
                ctx.fillText("P", it.x, it.y);
            });
            ctx.restore();
        }

        function renderEffects() {
            ctx.shadowColor = COLOR_NEON_YELLOW;
            ctx.fillStyle = COLOR_NEON_YELLOW;
            ctx.font = "bold 15px Courier New";
            particles.forEach(p => {
                ctx.fillText("*", p.x, p.y);
            });

            scoreEffects.forEach(fx => {
                ctx.shadowColor = fx.color;
                ctx.fillStyle = fx.color;
                ctx.font = `bold ${fx.size}px Courier New`;
                ctx.fillText(fx.text, fx.x, fx.y);
            });
        }

        function getPlayerVisual() {
            if (pItemsCollected === 2) return { text: "□△□", fontSize: 22 };
            if (pItemsCollected === 3) return { text: "◆▲◆", fontSize: 22 };
            return { text: "△", fontSize: 24 };
        }

        function renderPlayer() {
            const visual = getPlayerVisual();

            // ★無敵時間中は「点滅」ではなく「白色表示」で常時描画する
            //   通常時: 黄色 / 無敵中: 白色
            const playerColor = invincibilityTimer > 0 ? COLOR_WHITE : COLOR_NEON_YELLOW;

            ctx.shadowColor = playerColor;
            ctx.fillStyle = playerColor;
            ctx.font = `bold ${visual.fontSize}px Courier New`;
            ctx.fillText(visual.text, playerX, PLAYER_Y);
        }

        // ステータス表示（DOM）の更新。Canvas描画ではないが、
        // 描画パイプラインの一部として明示的に切り出している。
        function renderUI() {
            updateStatus();
        }

        function updateStatus() {
            scoreEl.textContent = score;
            powerLevelEl.textContent = pItemsCollected === 3 ? "LV.MAX" : `LV.${pItemsCollected}`;

            // LV.MAX時のみ黄色、それ以外は通常の緑色で表示
            powerLevelEl.style.color = (pItemsCollected === 3) ? "var(--neon-yellow)" : "var(--text-color)";
        }

        // 描画順: 背景 → 敵弾 → 自機弾 → 敵 → アイテム → エフェクト → プレイヤー
        function renderCanvas() {
            ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);

            // 前フレームの設定が残らないよう、まず既定状態にリセットする
            ctx.textAlign = "start";
            ctx.textBaseline = "alphabetic";
            ctx.shadowBlur = 0;

            renderStars();

            ctx.shadowBlur = 8;
            renderEnemyBullets();
            renderPlayerBullets();
            renderEnemies();
            renderItems();      // 内部でsave/restoreするため、他描画に影響しない
            renderEffects();
            renderPlayer();

            ctx.shadowBlur = 0;
        }


        /*****************************************************************
         * ゲームループ
         *****************************************************************/

        // 敵の左右移動（猛攻フェーズ中のみ）。画面端で跳ね返る。
        function updateEnemyHorizontalMovement() {
            if (!isRampagePhase()) return;

            enemies.forEach(e => {
                e.x += e.hDir * ENEMY_HORIZONTAL_SPEED;
                if (e.x < ENEMY_HORIZONTAL_MARGIN) {
                    e.x = ENEMY_HORIZONTAL_MARGIN;
                    e.hDir = 1;
                } else if (e.x > V_WIDTH - ENEMY_HORIZONTAL_MARGIN) {
                    e.x = V_WIDTH - ENEMY_HORIZONTAL_MARGIN;
                    e.hDir = -1;
                }
            });
        }

        function updateEntityPositions() {
            bullets.forEach(b => b.y -= b.speed);
            enemies.forEach(e => e.y += e.speed);
            updateEnemyHorizontalMovement();
            enemyBullets.forEach(eb => eb.y += eb.speed);
            updateItemsPosition();

            stars.forEach(s => {
                s.y += s.speed;
                if (s.y > V_HEIGHT) {
                    s.y = 0;
                    s.x = Math.random() * V_WIDTH;
                }
            });
        }

        // 進行判定（取り逃し・被弾）を行う前に、画面外へ出た自機弾・敵弾・
        // アイテムを除去しておく（敵はこの時点ではまだ除去しない。取り逃し判定で
        // 使うOFFSCREEN_Yへの退避処理より先に消してしまうと減点処理が
        // スキップされてしまうため）
        function cleanupBeforeCollisionChecks() {
            bullets = bullets.filter(b => b.y > -20);
            enemyBullets = enemyBullets.filter(eb => eb.y < V_HEIGHT + 20);
            cleanupItems();
        }

        // 衝突判定後の後片付け：命中して消費された自機弾と、撃破された敵を除去する
        function cleanupAfterCollisionChecks() {
            bullets = bullets.filter(b => b.y > -20);
            enemies = enemies.filter(e => e.y < V_HEIGHT);
        }

        function updateEnemySpawning() {
            enemySpawnCooldown--;
            if (enemySpawnCooldown <= 0) {
                spawnEnemy();

                // 1000点ごとに、スポーン間隔の下限を引き下げて出現頻度を向上
                const difficultyLevel = getDifficultyLevel();
                const minCooldown = Math.max(
                    ENEMY_SPAWN_COOLDOWN_FLOOR_MIN,
                    ENEMY_SPAWN_COOLDOWN_FLOOR_BASE - difficultyLevel * ENEMY_SPAWN_COOLDOWN_FLOOR_STEP
                );
                enemySpawnCooldown = Math.max(
                    minCooldown,
                    ENEMY_SPAWN_COOLDOWN_BASE - Math.floor(score / ENEMY_SPAWN_COOLDOWN_SCORE_DIVISOR)
                );
            }
        }

        function updateEnemyShooting() {
            enemyShootCooldown--;
            if (enemyShootCooldown <= 0) {
                // 難易度レベルに応じて、敵弾の速度が段階的に上昇（レベル1につき+12%）
                const bulletSpeedMultiplier = 1.0 + (getDifficultyLevel() * DIFFICULTY_BULLET_SPEED_STEP);
                // 通常は〇以外のみ攻撃するが、猛攻フェーズ（スコア2000点超）では〇も攻撃する
                const rampage = isRampagePhase();

                enemies.forEach(e => {
                    if ((rampage || e.type !== '〇') && Math.random() < ENEMY_SHOOT_CHANCE) {
                        enemyBullets.push({ x: e.x, y: e.y + 10, speed: ENEMY_BULLET_BASE_SPEED * bulletSpeedMultiplier });
                    }
                });
                enemyShootCooldown = ENEMY_SHOOT_COOLDOWN_MAX;
            }
        }

        function updateMechanics() {
            updatePlayerMovement();
            updateInvincibility();
            updatePlayerShooting();
            updateEnemySpawning();
            updateEnemyShooting();

            updateEntityPositions();
            updateScoreEffects();
            updateParticles();
            cleanupBeforeCollisionChecks();

            checkEnemyEscape();
            checkPlayerHit();
            if (!isPlaying) return; // ゲームオーバーになった場合はここで打ち切る（元のreturnと同じ挙動）

            checkItemPickup();
            checkBulletEnemyCollisions();
            cleanupAfterCollisionChecks();

            if (score > hiScore) {
                hiScore = score;
                hiScoreDisplay.textContent = hiScore;
            }

            renderUI();
        }

        function gameLoop() {
            if (!isPlaying) return;

            updateMechanics();
            renderCanvas();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (isPlaying) return;
            isPlaying = true;
            startOverlay.style.display = "none";
            gameoverOverlay.style.display = "none";
            startBtn.style.display = "none";
            retryBtn.style.display = "none";
            backBtn.style.display = "none";
            initGame();
            gameLoop();
        }

        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationFrameId);
            finalScoreEl.textContent = score;

            if (score >= hiScore) {
                hiScore = score;
                localStorage.setItem('stg_hi_score', hiScore);
            }
            scoreHistory.unshift(score);
            if (scoreHistory.length > MAX_SCORE_HISTORY) scoreHistory.pop();
            localStorage.setItem('stg_history', JSON.stringify(scoreHistory));

            loadAndRenderScoreBoard();
            gameoverOverlay.style.display = "flex";
            retryBtn.style.display = "inline-block";
            backBtn.style.display = "inline-block";
        }


        /*****************************************************************
         * UIイベント
         *****************************************************************/

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (!isPlaying && e.code === "Space") startGame();
        });
        window.addEventListener('keyup', (e) => {
            delete keys[e.key];
        });

        btnLeft.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveDirection = -1;
            btnLeft.classList.add('touch-active');
        });
        btnLeft.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (moveDirection === -1) moveDirection = 0;
            btnLeft.classList.remove('touch-active');
        });
        btnLeft.addEventListener('mousedown', () => {
            moveDirection = -1;
            btnLeft.classList.add('touch-active');
        });
        btnLeft.addEventListener('mouseup', () => {
            if (moveDirection === -1) moveDirection = 0;
            btnLeft.classList.remove('touch-active');
        });
        btnLeft.addEventListener('mouseleave', () => {
            if (moveDirection === -1) moveDirection = 0;
            btnLeft.classList.remove('touch-active');
        });

        btnRight.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveDirection = 1;
            btnRight.classList.add('touch-active');
        });
        btnRight.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (moveDirection === 1) moveDirection = 0;
            btnRight.classList.remove('touch-active');
        });
        btnRight.addEventListener('mousedown', () => {
            moveDirection = 1;
            btnRight.classList.add('touch-active');
        });
        btnRight.addEventListener('mouseup', () => {
            if (moveDirection === 1) moveDirection = 0;
            btnRight.classList.remove('touch-active');
        });
        btnRight.addEventListener('mouseleave', () => {
            if (moveDirection === 1) moveDirection = 0;
            btnRight.classList.remove('touch-active');
        });

        startBtn.addEventListener('click', startGame);
        retryBtn.addEventListener('click', startGame);

        backBtn.addEventListener('click', () => {
            window.location.href = "index.html";
        });

        resizeCanvas();
        initGame();
    })();
    </script>
</body>
</html>
