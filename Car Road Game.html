<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CAR Road GAME</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        :root {
            --bg-color: #020703;
            --text-color: #33ff66; 
            --accent-color: #ff0055;
        }

        /* 画面全体のスクロールを完全にロック */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        body {
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            /* 上下左右の基本余白＋スマホのセーフエリア保護 */
            padding-top: env(safe-area-inset-top, 5px);
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 15px); 
            padding-left: 10px;
            padding-right: 10px;
        }

        /* ブラウン管フィルター */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        header {
            text-align: center;
            width: 100%;
            max-width: 400px;
            flex-shrink: 0;
            padding: 2px 0;
        }

        h1 {
            margin: 2px 0;
            font-size: 1.4rem;
            font-weight: 900;
            text-shadow: 0 0 10px var(--text-color), 0 0 20px rgba(51, 255, 102, 0.5);
            letter-spacing: 1px;
        }

        .status-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            padding: 4px 10px;
            font-size: 0.8rem;
            border: 2px solid var(--text-color);
            background: #000;
            box-shadow: 0 0 15px rgba(51, 255, 102, 0.2);
        }

        /* ゲーム画面エリア */
        #game-area {
            position: relative;
            width: 100%;
            max-width: 400px;
            flex-grow: 1; 
            flex-shrink: 1; 
            min-height: 140px; 
            margin: 5px 0;
            border: 3px solid var(--text-color);
            background-color: #000;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            box-shadow: 0 0 25px rgba(51, 255, 102, 0.4);
        }

        /* 画面全体の高さに合わせてフォントサイズを追従 */
        #road-display {
            width: 100%;
            white-space: pre;
            font-size: 3.2vw; 
            line-height: 0.90; 
            text-align: left;
            margin-bottom: 2px;
            font-weight: bold;
            text-shadow: 0 0 3px var(--text-color);
        }

        /* 縦幅制限スマホ向けの超強力な文字圧縮セーフティ */
        @media (max-height: 780px) {
            #road-display {
                font-size: 1.7vh; 
                line-height: 0.88;
            }
        }
        @media (max-height: 600px) {
            #road-display {
                font-size: 1.5vh;
                line-height: 0.85;
            }
            h1 { font-size: 1.1rem; }
            .status-container { font-size: 0.7rem; }
        }
        @media (min-width: 450px) and (min-height: 781px) {
            #road-display {
                font-size: 14.5px;
            }
        }

        /* オーバーレイ */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 2, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay h2 {
            font-size: 1.8rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-shadow: 0 0 12px var(--accent-color);
            letter-spacing: 3px;
        }

        .overlay p {
            margin: 5px 0;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* ★下部固定のフッターエリア（絶対に隠さない・潰さない） */
        footer {
            width: 100%;
            max-width: 400px;
            text-align: center;
            flex-shrink: 0; 
            margin-top: auto; 
        }

        /* スタート・リトライボタンのコンテナ */
        .action-button-container {
            width: 100%;
            height: 44px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-action {
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 6px 30px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(51, 255, 102, 0.4);
            letter-spacing: 1px;
            display: inline-block;
        }

        .btn-action:hover, .btn-action:active {
            background-color: var(--text-color);
            color: #000;
            box-shadow: 0 0 20px var(--text-color);
        }

        /* ★新規：スコアデータ表示エリア（左右分割レイアウト） */
        .score-board-container {
            display: flex;
            justify-content: space-between;
            width: 95%;
            margin: 0 auto 10px auto;
            font-size: 0.75rem;
            border-top: 1px dashed rgba(51, 255, 102, 0.3);
            padding-top: 6px;
            text-align: left;
        }

        /* 左側：最高スコア */
        .hi-score-box {
            width: 45%;
            color: #fff;
            text-shadow: 0 0 5px #fff;
        }
        .hi-score-box span {
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: bold;
            display: block;
            margin-top: 2px;
        }

        /* 右側：過去10回の履歴 */
        .history-box {
            width: 50%;
            text-align: right;
            max-height: 48px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
            color: #8cba94;
            line-height: 1.2;
            padding-right: 2px;
        }
        /* スクロールバーをおしゃれに隠す/微調整 */
        .history-box::-webkit-scrollbar {
            width: 3px;
        }
        .history-box::-webkit-scrollbar-thumb {
            background: var(--text-color);
        }

        .controls {
            display: flex;
            justify-content: space-around;
            width: 85%;
            margin: 0 auto;
        }

        .btn-touch {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            touch-action: manipulation;
            background: rgba(51, 255, 102, 0.12); 
            box-shadow: 0 0 10px rgba(51, 255, 102, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>CAR Road GAME</h1>
        <div class="status-container">
            <div>SCORE: <span id="score">0</span></div>
            <div>LEVEL: <span id="level">1</span></div>
            <div>DIST : <span id="distance">0</span>m</div>
            <div>SPEED: <span id="speed">0</span> km/h</div>
        </div>
    </header>

    <div id="game-area">
        <div id="road-display"></div>

        <div id="start-overlay" class="overlay">
            <h2>CAR Road GAME</h2>
            <p>INSERT COIN [SPACE]</p>
        </div>

        <div id="gameover-overlay" class="overlay" style="display: none;">
            <h2>GAME OVER</h2>
            <p>FINAL SCORE: <span id="final-score">0</span></p>
        </div>
    </div>

    <footer>
        <div class="action-button-container">
            <button id="start-btn" class="btn-action">START GAME</button>
            <button id="retry-btn" class="btn-action" style="display: none;">PLAY AGAIN</button>
        </div>

        <div class="score-board-container">
            <div class="hi-score-box">
                🏆 HI-SCORE
                <span id="hi-score-display">0</span>
            </div>
            <div class="history-box" id="history-display">
                HISTORY (TOP10)<br>- NO DATA -
            </div>
        </div>

        <div class="controls">
            <button id="btn-left" class="btn-touch">◀</button>
            <button id="btn-right" class="btn-touch">▶</button>
        </div>
    </footer>

    <script>
        const DISPLAY_ROWS = 28;     
        const ROAD_TOTAL_WIDTH = 30; 

        let gameInterval = null;
        let isPlaying = false;
        
        let score = 0;
        let distance = 0;
        let speed = 200; 
        let level = 1;

        let playerX = 15;
        let roadData = [];

        let curveTheta = 0;      
        let curveTargetAmp = 0;  
        let currentAmp = 0;      
        let segmentDuration = 0; 
        let nextGateDistance = 1000; 

        let touchTimer = null;

        // ★スコアシステム用のローカルストレージ変数
        let hiScore = parseInt(localStorage.getItem('car_road_hi_score')) || 0;
        let scoreHistory = JSON.parse(localStorage.getItem('car_road_history')) || [];

        const roadDisplay = document.getElementById('road-display');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const distanceEl = document.getElementById('distance');
        const speedEl = document.getElementById('speed');
        const startOverlay = document.getElementById('start-overlay');
        const gameoverOverlay = document.getElementById('gameover-overlay');
        const finalScoreEl = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        
        // 新規追加要素の取得
        const hiScoreDisplay = document.getElementById('hi-score-display');
        const historyDisplay = document.getElementById('history-display');

        function initGame() {
            score = 0;
            distance = 0;
            speed = 200;
            level = 1;
            playerX = 15;
            roadData = [];
            curveTheta = 0;
            curveTargetAmp = 0;
            currentAmp = 0;
            segmentDuration = 0;
            nextGateDistance = 1000;

            for (let i = 0; i < DISPLAY_ROWS; i++) {
                roadData.push({ left: 10, width: 10, center: 15, msg: null });
            }

            // ハイスコアと履歴ボードを初期描画
            loadAndRenderScoreBoard();
            updateStatus();
            render();
        }

        // ★ハイスコアと履歴を読み込んで描画する関数
        function loadAndRenderScoreBoard() {
            hiScoreDisplay.textContent = hiScore;
            
            if (scoreHistory.length === 0) {
                historyDisplay.innerHTML = "HISTORY (LAST10)<br>No games yet.";
            } else {
                let html = "HISTORY (LAST10)<br>";
                scoreHistory.forEach((s, idx) => {
                    html += `#${idx + 1}: ${s}m<br>`;
                });
                historyDisplay.innerHTML = html;
            }
        }

        function gameLoop() {
            if (!isPlaying) return;

            distance += Math.floor(speed / 35);
            score = distance;

            // リアルタイムでハイスコアを超えたらリアルタイム表記更新！
            if (score > hiScore) {
                hiScore = score;
                hiScoreDisplay.textContent = hiScore;
            }

            level = Math.floor(distance / 350) + 1;
            speed = 200 + (level - 1) * 35; 
            
            let maxRoadWidth = Math.max(6, 10 - Math.floor(level / 3));

            if (segmentDuration <= 0) {
                if (Math.random() < 0.75) {
                    const limit = Math.min(10, 6 + Math.floor(level / 2));
                    curveTargetAmp = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * (limit - 4));
                    segmentDuration = 40 + Math.floor(Math.random() * 40); 
                } else {
                    curveTargetAmp = 0; 
                    segmentDuration = 15 + Math.floor(Math.random() * 15); 
                }
            }
            segmentDuration--;

            currentAmp += (curveTargetAmp - currentAmp) * 0.08;
            
            curveTheta += 0.05;
            let centerFloat = 15.0 + currentAmp + (Math.sin(curveTheta) * (currentAmp === 0 ? 0 : 0.5));

            const currentWidth = maxRoadWidth;
            let leftEdge = Math.round(centerFloat - (currentWidth / 2));
            
            if (leftEdge < 1) leftEdge = 1;
            if (leftEdge + currentWidth >= ROAD_TOTAL_WIDTH - 1) {
                leftEdge = ROAD_TOTAL_WIDTH - 1 - currentWidth;
            }

            let rowMessage = null;
            if (distance >= nextGateDistance) {
                rowMessage = `Run ${nextGateDistance}m`;
                nextGateDistance += 1000;
                speed += 25; 
            }

            roadData.push({ 
                left: leftEdge, 
                width: currentWidth, 
                center: Math.round(centerFloat),
                msg: rowMessage
            });
            roadData.shift();

            const playerRow = roadData[0]; 
            const rightEdge = playerRow.left + playerRow.width;

            if (playerX <= playerRow.left || playerX >= rightEdge) {
                gameOver();
                return;
            }

            updateStatus();
            render();
        }

        function updateStatus() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            distanceEl.textContent = distance;
            speedEl.textContent = speed;
        }

        function render() {
            let displayHTML = "";

            for (let i = DISPLAY_ROWS - 1; i >= 0; i--) {
                const row = roadData[i];
                let lineArr = new Array(ROAD_TOTAL_WIDTH).fill(" ");

                if (row.msg) {
                    const text = `--- ${row.msg} ---`;
                    let startPos = Math.max(0, Math.floor((ROAD_TOTAL_WIDTH - text.length) / 2));
                    for(let charIdx=0; charIdx<text.length; charIdx++) {
                        if(startPos + charIdx < ROAD_TOTAL_WIDTH) {
                            lineArr[startPos + charIdx] = `<span style='color:#fff; background:${varAccentColor()}; font-weight:bold;'>${text[charIdx]}</span>`;
                        }
                    }
                } else {
                    lineArr[row.left] = "|";
                    lineArr[row.left + row.width] = "|";

                    if ((distance + i) % 2 === 0) {
                        const mid = row.center;
                        if (mid > row.left && mid < row.left + row.width) {
                            lineArr[mid] = "<span style='color: rgba(51, 255, 102, 0.4);'>.</span>";
                        }
                    }
                }

                if (i === 0) {
                    if (playerX >= 0 && playerX < ROAD_TOTAL_WIDTH) {
                        lineArr[playerX] = "<span style='color: var(--accent-color); text-shadow: 0 0 8px var(--accent-color); font-weight:900;'>▲</span>";
                    }
                }

                displayHTML += lineArr.join("") + "\n";
            }

            roadDisplay.innerHTML = displayHTML;
        }

        function varAccentColor() {
            return getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
        }

        function startGame() {
            if (isPlaying) return;
            isPlaying = true;
            startOverlay.style.display = "none";
            gameoverOverlay.style.display = "none";
            startBtn.style.display = "none";
            retryBtn.style.display = "none";
            initGame();
            gameInterval = setInterval(gameLoop, 33);
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(touchTimer);
            finalScoreEl.textContent = score;
            
            // ★スコア保存・更新処理
            // ハイスコアの永続保存
            if (score >= hiScore) {
                hiScore = score;
                localStorage.setItem('car_road_hi_score', hiScore);
            }
            
            // 過去の履歴を配列の先頭に追加し、10個を超えたら古いものを削除
            scoreHistory.unshift(score);
            if (scoreHistory.length > 10) {
                scoreHistory.pop();
            }
            localStorage.setItem('car_road_history', JSON.stringify(scoreHistory));

            // ボードの再描画
            loadAndRenderScoreBoard();

            gameoverOverlay.style.display = "flex";
            startBtn.style.display = "none";
            retryBtn.style.display = "inline-block"; 
        }

        window.addEventListener('keydown', (e) => {
            if (!isPlaying) {
                if (e.code === "Space") startGame();
                return;
            }

            if (e.key === "ArrowLeft" || e.key === "Left") {
                playerX = Math.max(0, playerX - 1);
                render();
            } else if (e.key === "ArrowRight" || e.key === "Right") {
                playerX = Math.min(ROAD_TOTAL_WIDTH - 1, playerX + 1);
                render();
            }
        });

        function startMove(direction) {
            if (!isPlaying) return;
            
            if (direction === 'left') playerX = Math.max(0, playerX - 1);
            else playerX = Math.min(ROAD_TOTAL_WIDTH - 1, playerX + 1);
            render();

            clearInterval(touchTimer);
            touchTimer = setInterval(() => {
                if (direction === 'left') playerX = Math.max(0, playerX - 1);
                else playerX = Math.min(ROAD_TOTAL_WIDTH - 1, playerX + 1);
                render();
            }, 25); 
        }

        function stopMove() {
            clearInterval(touchTimer);
        }

        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); startMove('left'); });
        btnLeft.addEventListener('touchend', stopMove);
        btnLeft.addEventListener('mousedown', () => startMove('left'));
        btnLeft.addEventListener('mouseup', stopMove);
        btnLeft.addEventListener('mouseleave', stopMove);

        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); startMove('right'); });
        btnRight.addEventListener('touchend', stopMove);
        btnRight.addEventListener('mousedown', () => startMove('right'));
        btnRight.addEventListener('mouseup', stopMove);
        btnRight.addEventListener('mouseleave', stopMove);

        startBtn.addEventListener('click', startGame);
        retryBtn.addEventListener('click', startGame);

        initGame();
    </script>
</body>
</html>
