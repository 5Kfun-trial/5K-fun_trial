<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CAR Road GAME</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        :root {
            --bg-color: #020703;
            --text-color: #33ff66; 
            --accent-color: #ff0055;
        }

        /* 画面全体のスクロールを完全にロック */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        body {
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            /* 上下左右の基本余白＋スマホのセーフエリア保護 */
            padding-top: env(safe-area-inset-top, 5px);
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 15px); 
            padding-left: 10px;
            padding-right: 10px;
        }

        /* ブラウン管フィルター */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        header {
            text-align: center;
            width: 100%;
            max-width: 400px;
            flex-shrink: 0;
            padding: 2px 0;
        }

        h1 {
            margin: 2px 0;
            font-size: 1.4rem;
            font-weight: 900;
            text-shadow: 0 0 10px var(--text-color), 0 0 20px rgba(51, 255, 102, 0.5);
            letter-spacing: 1px;
        }

        .status-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            padding: 4px 10px;
            font-size: 0.8rem;
            border: 2px solid var(--text-color);
            background: #000;
            box-shadow: 0 0 15px rgba(51, 255, 102, 0.2);
        }

        /* ゲーム画面エリア */
        #game-area {
            position: relative;
            width: 100%;
            max-width: 400px;
            flex-grow: 1; 
            flex-shrink: 1; 
            min-height: 140px; 
            margin: 5px 0;
            border: 3px solid var(--text-color);
            background-color: #000;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 下部（車側）を基準に道路を配置 */
            box-shadow: 0 0 25px rgba(51, 255, 102, 0.4);
            transition: background-color 0.1s, border-color 0.1s;
        }

        /* 破壊時の横ブレと赤画面化エフェクト */
        @keyframes crash-shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-12px, 0); }
            20% { transform: translate(12px, 0); }
            30% { transform: translate(-10px, 0); }
            40% { transform: translate(10px, 0); }
            50% { transform: translate(-7px, 0); }
            60% { transform: translate(7px, 0); }
            70% { transform: translate(-4px, 0); }
            80% { transform: translate(4px, 0); }
            90% { transform: translate(-1px, 0); }
            100% { transform: translate(0, 0); }
        }

        .crash-shake {
            animation: crash-shake 0.5s ease-out;
        }

        .crash-red {
            background-color: #66000c !important;
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 35px var(--accent-color) !important;
        }

        /* 道路表示：文字サイズを適切な大きさに保ちつつ、横幅はみ出しのみを動的に防止 */
        #road-display {
            width: 100%;
            white-space: pre;
            font-size: min(3.4vw, 15px); 
            line-height: 0.88; 
            text-align: left;
            margin-bottom: 2px;
            font-weight: bold;
            text-shadow: 0 0 3px var(--text-color);
        }

        @media (max-height: 600px) {
            h1 { font-size: 1.1rem; }
            .status-container { font-size: 0.7rem; }
        }

        /* オーバーレイ */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 2, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay h2 {
            font-size: 1.8rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            text-shadow: 0 0 12px var(--accent-color);
            letter-spacing: 3px;
        }

        .overlay p {
            margin: 5px 0;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* 下部固定のフッターエリア */
        footer {
            width: 100%;
            max-width: 400px;
            text-align: center;
            flex-shrink: 0; 
            margin-top: auto; 
        }

        /* スタート・リトライボタン・戻るボタンのコンテナ（縦並びに対応） */
        .action-button-container {
            width: 100%;
            height: auto;
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px; /* ボタン間の隙間 */
        }

        .btn-action {
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 6px 30px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(51, 255, 102, 0.4);
            letter-spacing: 1px;
            display: inline-block;
        }

        .btn-action:hover, .btn-action:active {
            background-color: var(--text-color);
            color: #000;
            box-shadow: 0 0 20px var(--text-color);
        }

        /* スコアデータ表示エリア（左右分割レイアウト） */
        .score-board-container {
            display: flex;
            justify-content: space-between;
            width: 95%;
            margin: 0 auto 10px auto;
            font-size: 0.75rem;
            border-top: 1px dashed rgba(51, 255, 102, 0.3);
            padding-top: 6px;
            text-align: left;
        }

        /* 左側：最高スコア */
        .hi-score-box {
            width: 45%;
            color: #fff;
            text-shadow: 0 0 5px #fff;
        }
        .hi-score-box span {
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: bold;
            display: block;
            margin-top: 2px;
        }

        /* 右側：過去10回の履歴 */
        .history-box {
            width: 50%;
            text-align: right;
            max-height: 48px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
            color: #8cba94;
            line-height: 1.2;
            padding-right: 2px;
        }
        /* スクロールバーをおしゃれに隠す/微調整 */
        .history-box::-webkit-scrollbar {
            width: 3px;
        }
        .history-box::-webkit-scrollbar-thumb {
            background: var(--text-color);
        }

        .controls {
            display: flex;
            justify-content: space-around;
            width: 85%;
            margin: 0 auto;
        }

        /* 操作ボタン：周りのインターフェースと同じ鮮やかな緑（ネオングリーン）に統一 */
        .btn-touch {
            width: 62px;
            height: 62px;
            font-size: 1.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
            transition: all 0.1s ease;

            background: rgba(51, 255, 102, 0.15);
            border: 2px solid var(--text-color);
            color: var(--text-color);
            text-shadow: 0 0 8px var(--text-color);
            box-shadow: 0 0 12px rgba(51, 255, 102, 0.3);
        }
        
        /* ★触った（ホバー、クリック、タップしている間）ときに背景が緑に塗りつぶされ、矢印が黒になるスタイル */
        .btn-touch:hover, .btn-touch:active, .btn-touch.touch-active {
            background: var(--text-color) !important;
            color: #000 !important;
            box-shadow: 0 0 25px var(--text-color) !important;
            text-shadow: none !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>CAR Road GAME</h1>
        <div class="status-container">
            <div>SCORE: <span id="score">0</span></div>
            <div>LEVEL: <span id="level">1</span></div>
            <div>DIST : <span id="distance">0</span>m</div>
            <div>SPEED: <span id="speed">0</span> km/h</div>
        </div>
    </header>

    <div id="game-area">
        <div id="road-display"></div>

        <div id="start-overlay" class="overlay">
            <h2>CAR Road GAME</h2>
            <p>INSERT COIN [SPACE]</p>
        </div>

        <div id="gameover-overlay" class="overlay" style="display: none;">
            <h2>GAME OVER</h2>
            <p>FINAL SCORE: <span id="final-score">0</span></p>
        </div>
    </div>

    <footer>
        <div class="action-button-container">
            <button id="start-btn" class="btn-action">START GAME</button>
            <button id="retry-btn" class="btn-action" style="display: none;">PLAY AGAIN</button>
            <button id="back-btn" class="btn-action">Back</button>
        </div>

        <div class="score-board-container">
            <div class="hi-score-box">
                🏆 HI-SCORE
                <span id="hi-score-display">0</span>
            </div>
            <div class="history-box" id="history-display">
                HISTORY (TOP10)<br>- NO DATA -
            </div>
        </div>

        <div class="controls">
            <button id="btn-left" class="btn-touch">◀</button>
            <button id="btn-right" class="btn-touch">▶</button>
        </div>
    </footer>

    <script>
        // 画面最上部まで綺麗に隙間なく埋めるため、道路の行数を 28行 から 42行 へ拡張
        const DISPLAY_ROWS = 42;     
        const ROAD_TOTAL_WIDTH = 30; 

        // アニメーションループ管理用（HTML5 requestAnimationFrame）
        let isPlaying = false;
        let lastTime = 0;
        let accumTime = 0;
        const stepTime = 33; // ゲームステップ処理は33ms周期

        let score = 0;
        let distance = 0;
        let speed = 200; 
        let level = 1;

        // スムーズな慣性移動のための変数設計
        let playerX = 15.0;
        let playerVX = 0.0;     // 左右の現在の速度
        const ACCEL = 0.06;     // キー/ボタン押下時の加速スピード
        const DECEL = 0.12;     // キー/ボタンを離した時の減速（摩擦）スピード
        const MAX_SPEED = 0.36; // 押し続けた時の最大速度（カーブを楽に曲がりきれる速度）

        const keysPressed = { left: false, right: false };

        let roadData = [];

        let curveTheta = 0;      
        let curveTargetAmp = 0;  
        let currentAmp = 0;      
        let segmentDuration = 0; 
        let nextGateDistance = 1000; 

        // 音声エンジン用（Web Audio API）
        let audioCtx = null;
        let engineOsc = null;
        let engineFilter = null;
        let engineGain = null;

        // スコアデータ
        let hiScore = parseInt(localStorage.getItem('car_road_hi_score')) || 0;
        let scoreHistory = JSON.parse(localStorage.getItem('car_road_history')) || [];

        const gameArea = document.getElementById('game-area');
        const roadDisplay = document.getElementById('road-display');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const distanceEl = document.getElementById('distance');
        const speedEl = document.getElementById('speed');
        const startOverlay = document.getElementById('start-overlay');
        const gameoverOverlay = document.getElementById('gameover-overlay');
        const finalScoreEl = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');
        const backBtn = document.getElementById('back-btn');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        
        const hiScoreDisplay = document.getElementById('hi-score-display');
        const historyDisplay = document.getElementById('history-display');

        function initGame() {
            score = 0;
            distance = 0;
            speed = 200;
            level = 1;
            playerX = 15.0;
            playerVX = 0.0;
            roadData = [];
            curveTheta = 0;
            curveTargetAmp = 0;
            currentAmp = 0;
            segmentDuration = 0;
            nextGateDistance = 1000;

            for (let i = 0; i < DISPLAY_ROWS; i++) {
                roadData.push({ left: 10, width: 10, center: 15, centerFloat: 15.0, msg: null });
            }

            loadAndRenderScoreBoard();
            updateStatus();
            render();
        }

        // Web Audio APIの初期化
        function initAudio() {
            if (audioCtx) return;
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;
            audioCtx = new AudioContextClass();
            
            // エンジン低音用のフィルター
            engineFilter = audioCtx.createBiquadFilter();
            engineFilter.type = 'lowpass';
            engineFilter.frequency.setValueAtTime(150, audioCtx.currentTime);
            
            // 音量調整用
            engineGain = audioCtx.createGain();
            engineGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
            
            engineFilter.connect(engineGain);
            engineGain.connect(audioCtx.destination);
        }

        // エンジン発振器の開始
        function startEngineSound() {
            if (!audioCtx) return;
            stopEngineSound();
            
            engineOsc = audioCtx.createOscillator();
            engineOsc.type = 'sawtooth'; // 鋸歯状波
            engineOsc.connect(engineFilter);
            engineOsc.start(0);
            
            engineGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 0.1);
        }

        // エンジン音の更新
        function updateEngineSound() {
            if (!audioCtx || !engineOsc || !isPlaying) return;
            
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            let baseFreq = 38 + (speed - 200) * 0.14; 
            let jitter = Math.sin(Date.now() * 0.06) * 1.5; 
            
            engineOsc.frequency.setTargetAtTime(baseFreq + jitter, audioCtx.currentTime, 0.1);
            
            let filterFreq = 120 + (speed - 200) * 0.45;
            engineFilter.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 0.1);
        }

        // エンジン音の停止
        function stopEngineSound() {
            if (engineOsc) {
                try {
                    engineOsc.stop();
                } catch(e) {}
                engineOsc.disconnect();
                engineOsc = null;
            }
            if (engineGain) {
                engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
            }
        }

        // 壁破壊時の爆発・クラッシュ音
        function playCrashSound() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const bufferSize = audioCtx.sampleRate * 0.5; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.setValueAtTime(280, audioCtx.currentTime);
            noiseFilter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.45);
            
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.45);
            
            noiseNode.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            
            noiseNode.start();
        }

        function loadAndRenderScoreBoard() {
            hiScoreDisplay.textContent = hiScore;
            
            if (scoreHistory.length === 0) {
                historyDisplay.innerHTML = "HISTORY (LAST10)<br>No games yet.";
            } else {
                let html = "HISTORY (LAST10)<br>";
                scoreHistory.forEach((s, idx) => {
                    html += `#${idx + 1}: ${s}m<br>`;
                });
                historyDisplay.innerHTML = html;
            }
        }

        // マイルドな慣性によるスムーズな左右移動計算
        function updatePlayerPosition() {
            if (!isPlaying) return;

            let targetDir = 0;
            if (keysPressed.left) targetDir -= 1;
            if (keysPressed.right) targetDir += 1;

            if (targetDir !== 0) {
                // 指標方向に向けて加速
                playerVX += targetDir * ACCEL;
                if (Math.abs(playerVX) > MAX_SPEED) {
                    playerVX = Math.sign(playerVX) * MAX_SPEED;
                }
            } else {
                // 入力なし時に摩擦でスムーズに減速
                if (playerVX > 0) {
                    playerVX = Math.max(0, playerVX - DECEL);
                } else if (playerVX < 0) {
                    playerVX = Math.min(0, playerVX + DECEL);
                }
            }

            playerX += playerVX;

            // 画面外はみ出し防止
            if (playerX < 0.5) {
                playerX = 0.5;
                playerVX = 0.0;
            }
            if (playerX > ROAD_TOTAL_WIDTH - 1.5) {
                playerX = ROAD_TOTAL_WIDTH - 1.5;
                playerVX = 0.0;
            }
        }

        // ゲームステップ処理
        function progressGameStep() {
            if (!isPlaying) return;

            distance += Math.floor(speed / 35);
            score = distance;

            if (score > hiScore) {
                hiScore = score;
                hiScoreDisplay.textContent = hiScore;
            }

            level = Math.floor(distance / 350) + 1;
            speed = 200 + (level - 1) * 35; 
            
            let maxRoadWidth = Math.max(6, 10 - Math.floor(level / 3));

            if (segmentDuration <= 0) {
                if (Math.random() < 0.75) {
                    const limit = Math.min(9, 5 + Math.floor(level / 2.5));
                    curveTargetAmp = (Math.random() > 0.5 ? 1 : -1) * (3 + Math.random() * (limit - 3));
                    segmentDuration = 35 + Math.floor(Math.random() * 35); 
                } else {
                    curveTargetAmp = 0; 
                    segmentDuration = 12 + Math.floor(Math.random() * 12); 
                }
            }
            segmentDuration--;

            currentAmp += (curveTargetAmp - currentAmp) * 0.04; // 移行スピードを少し下げてマイルド化
            
            curveTheta += 0.04;
            let nextCenterFloat = 15.0 + currentAmp + (Math.sin(curveTheta) * (currentAmp === 0 ? 0 : 0.4));

            // 道路の1ステップでの変化幅（急さ）を最大 0.13 文字分に厳しく制限して超マイルドな曲線にリファイン
            const maxShiftPerStep = 0.13;
            let lastRow = roadData[roadData.length - 1];
            let lastCenterFloat = lastRow ? lastRow.centerFloat : 15.0;
            
            let shift = nextCenterFloat - lastCenterFloat;
            if (Math.abs(shift) > maxShiftPerStep) {
                nextCenterFloat = lastCenterFloat + Math.sign(shift) * maxShiftPerStep;
            }

            const currentWidth = maxRoadWidth;
            let leftEdge = Math.round(nextCenterFloat - (currentWidth / 2));
            
            if (leftEdge < 1) {
                leftEdge = 1;
                nextCenterFloat = leftEdge + (currentWidth / 2);
            }
            if (leftEdge + currentWidth >= ROAD_TOTAL_WIDTH - 1) {
                leftEdge = ROAD_TOTAL_WIDTH - 1 - currentWidth;
                nextCenterFloat = leftEdge + (currentWidth / 2);
            }

            let rowMessage = null;
            if (distance >= nextGateDistance) {
                rowMessage = `Run ${nextGateDistance}m`;
                nextGateDistance += 1000;
                speed += 25; 
            }

            roadData.push({ 
                left: leftEdge, 
                width: currentWidth, 
                center: Math.round(nextCenterFloat),
                centerFloat: nextCenterFloat,
                msg: rowMessage
            });
            roadData.shift();

            updateStatus();
        }

        // 壁との衝突チェック
        function checkCollision() {
            if (!isPlaying) return;
            const playerRow = roadData[0]; 
            if (!playerRow) return;
            const rightEdge = playerRow.left + playerRow.width;
            const pX = Math.round(playerX);

            if (pX <= playerRow.left || pX >= rightEdge) {
                gameOver();
            }
        }

        // HTML5 requestAnimationFrame 対応のメインゲームループ
        function gameLoopRAF(timestamp) {
            if (!isPlaying) return;

            if (!lastTime) lastTime = timestamp;
            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            if (deltaTime > 100) deltaTime = 33;

            accumTime += deltaTime;

            updatePlayerPosition();

            while (accumTime >= stepTime) {
                progressGameStep();
                accumTime -= stepTime;
            }

            checkCollision();

            if (isPlaying) {
                render();
                updateEngineSound();
                requestAnimationFrame(gameLoopRAF);
            }
        }

        function updateStatus() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            distanceEl.textContent = distance;
            
            // ★ スピード感はそのままに、表示用のSPEED数値のみを「100km/hから徐々に上がり、320km/hがMAX（カンスト）」になるよう常識の範囲に設定 [1]
            let displaySpeed = 100 + Math.floor(distance / 12);
            if (displaySpeed > 320) displaySpeed = 320;
            speedEl.textContent = displaySpeed;
        }

        function render() {
            let displayHTML = "";

            for (let i = DISPLAY_ROWS - 1; i >= 0; i--) {
                const row = roadData[i];
                let lineArr = new Array(ROAD_TOTAL_WIDTH).fill(" ");

                if (row.msg) {
                    const text = `--- ${row.msg} ---`;
                    let startPos = Math.max(0, Math.floor((ROAD_TOTAL_WIDTH - text.length) / 2));
                    for(let charIdx=0; charIdx<text.length; charIdx++) {
                        if(startPos + charIdx < ROAD_TOTAL_WIDTH) {
                            lineArr[startPos + charIdx] = `<span style='color:#fff; background:${varAccentColor()}; font-weight:bold;'>${text[charIdx]}</span>`;
                        }
                    }
                } else {
                    lineArr[row.left] = "|";
                    lineArr[row.left + row.width] = "|";

                    if ((distance + i) % 2 === 0) {
                        const mid = row.center;
                        if (mid > row.left && mid < row.left + row.width) {
                            lineArr[mid] = "<span style='color: rgba(51, 255, 102, 0.4);'>.</span>";
                        }
                    }
                }

                if (i === 0) {
                    const pX = Math.round(playerX);
                    if (pX >= 0 && pX < ROAD_TOTAL_WIDTH) {
                        lineArr[pX] = "<span style='color: var(--accent-color); text-shadow: 0 0 8px var(--accent-color); font-weight:900;'>▲</span>";
                    }
                }

                displayHTML += lineArr.join("") + "\n";
            }

            roadDisplay.innerHTML = displayHTML;
        }

        function varAccentColor() {
            return getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
        }

        function startGame() {
            if (isPlaying) return;
            
            initAudio();
            startEngineSound();

            isPlaying = true;
            startOverlay.style.display = "none";
            gameoverOverlay.style.display = "none";
            startBtn.style.display = "none";
            retryBtn.style.display = "none";
            backBtn.style.display = "none";
            
            gameArea.classList.remove('crash-shake', 'crash-red');

            initGame();
            
            lastTime = 0;
            accumTime = 0;
            requestAnimationFrame(gameLoopRAF);
        }

        function gameOver() {
            isPlaying = false;
            
            stopEngineSound();
            playCrashSound();

            gameArea.classList.add('crash-shake', 'crash-red');
            setTimeout(() => {
                gameArea.classList.remove('crash-shake');
            }, 500);

            finalScoreEl.textContent = score;
            
            if (score >= hiScore) {
                hiScore = score;
                localStorage.setItem('car_road_hi_score', hiScore);
            }
            
            scoreHistory.unshift(score);
            if (scoreHistory.length > 10) {
                scoreHistory.pop();
            }
            localStorage.setItem('car_road_history', JSON.stringify(scoreHistory));

            loadAndRenderScoreBoard();

            gameoverOverlay.style.display = "flex";
            startBtn.style.display = "none";
            retryBtn.style.display = "inline-block"; 
            backBtn.style.display = "inline-block"; 
        }

        window.addEventListener('keydown', (e) => {
            if (!isPlaying) {
                if (e.code === "Space") startGame();
                return;
            }

            if (e.key === "ArrowLeft" || e.key === "Left") {
                keysPressed.left = true;
            } else if (e.key === "ArrowRight" || e.key === "Right") {
                keysPressed.right = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === "ArrowLeft" || e.key === "Left") {
                keysPressed.left = false;
            } else if (e.key === "ArrowRight" || e.key === "Right") {
                keysPressed.right = false;
            }
        });

        // ★ モバイル等のタッチ操作・マウスクリック入力の統一制御（触れている間に色を変える処理をJavaScriptで完璧に連動） [2]
        btnLeft.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            keysPressed.left = true; 
            btnLeft.classList.add('touch-active'); // 緑塗りつぶしクラスを追加
        });
        btnLeft.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            keysPressed.left = false; 
            btnLeft.classList.remove('touch-active'); // 解除
        });
        btnLeft.addEventListener('mousedown', () => { 
            keysPressed.left = true; 
            btnLeft.classList.add('touch-active');
        });
        btnLeft.addEventListener('mouseup', () => { 
            keysPressed.left = false; 
            btnLeft.classList.remove('touch-active');
        });
        btnLeft.addEventListener('mouseleave', () => { 
            keysPressed.left = false; 
            btnLeft.classList.remove('touch-active');
        });

        btnRight.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            keysPressed.right = true; 
            btnRight.classList.add('touch-active'); // 緑塗りつぶしクラスを追加
        });
        btnRight.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            keysPressed.right = false; 
            btnRight.classList.remove('touch-active'); // 解除
        });
        btnRight.addEventListener('mousedown', () => { 
            keysPressed.right = true; 
            btnRight.classList.add('touch-active');
        });
        btnRight.addEventListener('mouseup', () => { 
            keysPressed.right = false; 
            btnRight.classList.remove('touch-active');
        });
        btnRight.addEventListener('mouseleave', () => { 
            keysPressed.right = false; 
            btnRight.classList.remove('touch-active');
        });

        startBtn.addEventListener('click', startGame);
        retryBtn.addEventListener('click', startGame);
        
        // Backボタン押下時に index.html に遷移する処理
        backBtn.addEventListener('click', () => {
            window.location.href = "index.html";
        });

        initGame();
    </script>
</body>
</html>
