<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CAR Road GAME</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #05010f;
            --text-color: #00fff2;      /* neon cyan (was terminal green) */
            --accent-color: #ff2e92;    /* neon magenta (was red) */
            --neon-yellow: #ffe45e;
            --neon-purple: #7b2ff7;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        body {
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top, 5px);
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 15px);
            padding-left: 10px;
            padding-right: 10px;
            background: radial-gradient(ellipse at 50% 25%, #2a0e57 0%, #0a0420 55%, #030110 100%);
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(0, 255, 242, 0.04), rgba(255, 46, 146, 0.02), rgba(123, 47, 247, 0.04));
            z-index: 999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        header {
            text-align: center;
            width: 100%;
            max-width: 400px;
            flex-shrink: 0;
            padding: 2px 0;
        }

        h1 {
            margin: 4px 0 8px 0;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 0.95rem;
            font-weight: 400;
            color: #fff;
            text-shadow: 0 0 6px var(--text-color), 0 0 16px var(--accent-color), 0 0 28px var(--neon-purple);
            letter-spacing: 1px;
        }

        .status-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            padding: 4px 10px;
            font-size: 0.8rem;
            border: 2px solid var(--text-color);
            background: #000;
            box-shadow: 0 0 15px rgba(0, 255, 242, 0.25), inset 0 0 10px rgba(255, 46, 146, 0.08);
        }

        #game-area {
            position: relative;
            width: 100%;
            max-width: 400px;
            flex-grow: 1;
            flex-shrink: 1;
            min-height: 140px;
            margin: 5px 0;
            border: 3px solid var(--text-color);
            background-color: #05010f;
            overflow: hidden;
            box-sizing: border-box;
            box-shadow: 0 0 25px rgba(0, 255, 242, 0.35), 0 0 55px rgba(255, 46, 146, 0.15);
            transition: border-color 0.1s;
        }

        #game-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        @keyframes crash-shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-12px, 0); }
            20% { transform: translate(12px, 0); }
            30% { transform: translate(-10px, 0); }
            40% { transform: translate(10px, 0); }
            50% { transform: translate(-7px, 0); }
            60% { transform: translate(7px, 0); }
            70% { transform: translate(-4px, 0); }
            80% { transform: translate(4px, 0); }
            90% { transform: translate(-1px, 0); }
            100% { transform: translate(0, 0); }
        }

        @keyframes flash-red {
            0%, 100% { border-color: var(--text-color); }
            50% { border-color: var(--accent-color); }
        }

        .crash-shake { animation: crash-shake 0.5s ease-out; }
        .flash-red-animation { animation: flash-red 0.3s 3; }

        .crash-red {
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 35px var(--accent-color) !important;
        }

        #boom-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(1.4rem, 9vw, 2.4rem);
            color: #fff;
            text-shadow: 0 0 8px var(--neon-yellow), 0 0 24px var(--accent-color), 0 0 48px var(--accent-color);
            letter-spacing: 2px;
            z-index: 30;
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
        }
        #boom-text.show { animation: boom-pop 0.75s ease-out forwards; }
        @keyframes boom-pop {
            0%   { transform: translate(-50%, -50%) scale(0.2) rotate(-8deg); opacity: 0; }
            15%  { transform: translate(-50%, -50%) scale(1.35) rotate(5deg); opacity: 1; }
            30%  { transform: translate(-50%, -50%) scale(1) rotate(-2deg); opacity: 1; }
            78%  { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.12) rotate(0deg); opacity: 0; }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 1, 15, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .overlay h2 {
            font-family: 'Press Start 2P', monospace;
            font-size: 1.1rem;
            color: var(--accent-color);
            margin-bottom: 14px;
            text-shadow: 0 0 8px var(--accent-color), 0 0 20px var(--neon-purple);
            letter-spacing: 2px;
            text-align: center;
        }

        .overlay p { margin: 5px 0; font-size: 1rem; letter-spacing: 1px; color: var(--text-color); }

        footer { width: 100%; max-width: 400px; text-align: center; flex-shrink: 0; margin-top: auto; }

        .action-button-container {
            width: 100%; height: auto; margin-bottom: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px;
        }

        .btn-action {
            background-color: transparent; color: var(--text-color); border: 2px solid var(--text-color);
            padding: 8px 26px; font-family: 'Press Start 2P', monospace; font-size: 0.7rem; font-weight: 400; cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 242, 0.4); letter-spacing: 1px; display: inline-block;
        }

        .btn-action:hover, .btn-action:active { background-color: var(--text-color); color: #000; box-shadow: 0 0 20px var(--text-color); }

        .score-board-container {
            display: flex; justify-content: space-between; width: 95%; margin: 0 auto 10px auto;
            font-size: 0.75rem; border-top: 1px dashed rgba(0, 255, 242, 0.3); padding-top: 6px; text-align: left;
        }

        .hi-score-box { width: 45%; color: #fff; text-shadow: 0 0 5px #fff; }
        .hi-score-box span { color: var(--neon-yellow); font-size: 1.1rem; font-weight: bold; display: block; margin-top: 2px; }

        .history-box { width: 50%; text-align: right; max-height: 48px; overflow-y: auto; font-family: monospace; font-size: 0.7rem; color: #b18cf0; line-height: 1.2; padding-right: 2px; }
        .history-box::-webkit-scrollbar { width: 3px; }
        .history-box::-webkit-scrollbar-thumb { background: var(--text-color); }

        .controls { display: flex; justify-content: space-around; width: 85%; margin: 0 auto; }
        .btn-touch {
            width: 62px; height: 62px; font-size: 1.6rem; display: flex; justify-content: center; align-items: center;
            border-radius: 50%; touch-action: manipulation; user-select: none; cursor: pointer; transition: all 0.1s ease;
            background: rgba(0, 255, 242, 0.12); border: 2px solid var(--text-color); color: var(--text-color);
            box-shadow: 0 0 12px rgba(0, 255, 242, 0.3);
        }
        .btn-touch:hover, .btn-touch:active, .btn-touch.touch-active {
            background: var(--text-color) !important; color: #000 !important; box-shadow: 0 0 25px var(--text-color) !important;
        }

        .curve-guide {
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5; /* sits under the start/game-over overlays (z-index: 10) so it's hidden while they're shown */
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--text-color);
            border-radius: 4px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.85rem;
            color: var(--neon-yellow);
            text-shadow: 0 0 6px var(--neon-yellow), 0 0 14px var(--accent-color);
            pointer-events: none;
            letter-spacing: 1px;
        }
        .curve-guide .s-tag { color: var(--accent-color); text-shadow: 0 0 6px var(--accent-color), 0 0 14px var(--neon-purple); }
    </style>
</head>
<body>

    <header>
        <h1>CAR Road GAME</h1>
        <div class="status-container">
            <div>SCORE: <span id="score">0</span></div>
            <div>LEVEL: <span id="level">1</span></div>
            <div>DIST : <span id="distance">0</span>m</div>
            <div>SPEED: <span id="speed">0</span> km/h</div>
        </div>
    </header>

    <div id="game-area">
        <canvas id="game-canvas"></canvas>
        <div id="curve-guide" class="curve-guide">
            <span id="curve-arrow">→</span><span id="curve-s-tag" class="s-tag" style="display:none;">S</span>
        </div>
        <div id="boom-text">BOOM!!</div>

        <div id="start-overlay" class="overlay">
            <h2>CAR Road GAME</h2>
            <p>INSERT COIN [SPACE]</p>
        </div>

        <div id="gameover-overlay" class="overlay" style="display: none;">
            <h2>GAME OVER</h2>
            <p>FINAL SCORE: <span id="final-score">0</span></p>
        </div>
    </div>

    <footer>
        <div class="action-button-container">
            <button id="start-btn" class="btn-action">START GAME</button>
            <button id="retry-btn" class="btn-action" style="display: none;">PLAY AGAIN</button>
            <button id="back-btn" class="btn-action">Back</button>
        </div>

        <div class="score-board-container">
            <div class="hi-score-box">
                🏆 HI-SCORE
                <span id="hi-score-display">0</span>
            </div>
            <div class="history-box" id="history-display">
                HISTORY (TOP10)<br>- NO DATA -
            </div>
        </div>

        <div class="controls">
            <button id="btn-left" class="btn-touch">◀</button>
            <button id="btn-right" class="btn-touch">▶</button>
        </div>
    </footer>

    <script>
        const DISPLAY_ROWS = 42;
        const ROAD_TOTAL_WIDTH = 54;         // widened playfield so the road can start at ROAD_START_WIDTH with margin to spare
        const ROAD_CENTER = ROAD_TOTAL_WIDTH / 2;
        const GATE_INTERVAL = 100;           // distance milestone: was every 1000m -> now every 100m
        const ROAD_START_WIDTH = 40;         // road width (world units) at game start: ~4x the old start width (10)
        const ROAD_END_WIDTH = 10;           // final (narrowest) road width -- matches the ORIGINAL game-start width
        const WIDTH_STEP_M = 500;            // the road narrows a notch every time distance crosses a multiple of this
        const WIDTH_STEP_COUNT = 3;          // number of narrowing steps needed to go from ROAD_START_WIDTH to ROAD_END_WIDTH (500/1000/1500m)
        const WIDTH_STEP_TRANSITION_M = 100; // each narrowing step eases in over this many meters so the road never "jumps" onto the car
        const DIFFICULTY_START_M = 300;      // curves start getting sharper/more frequent from here (independent of road width now)
        const DIFFICULTY_RAMP_M = 1300;      // distance over which curve difficulty reaches max
        const EASY_CURVE_ZONE_M = 1000;      // up to this distance: only gentle, single-direction curves -- no S-curves allowed
        const CAR_HALF_WIDTH = 0.9;          // car half-width in world units: drives BOTH the visual size and the hitbox
        const TREE_SPACING = 5;              // place a roadside tree pair every N road rows
        const MAX_DISPLAY_SPEED = 350;       // km/h shown on the HUD, capped here
        const MAX_GAME_SPEED = 480;          // caps the internal speed variable; without this, level -> speed -> distance
                                              // -> level feeds back on itself and explodes after a couple of minutes of play
        let isPlaying = false, lastTime = 0, accumTime = 0, stepTime = 33;
        let score = 0, bonusScore = 0, distance = 0, speed = 200, level = 1;
        let playerX = ROAD_CENTER, playerVX = 0.0;
        const ACCEL = 0.06, DECEL = 0.12, MAX_SPEED = 0.36;
        const keysPressed = { left: false, right: false };
        let roadData = [], curveTheta = 0, curveTargetAmp = 0, currentAmp = 0, segmentDuration = 0, nextGateDistance = GATE_INTERVAL;
        let lastCurveDir = 0, curveDisplayDir = 1, curveIsSNext = false; // curve look-ahead guide state
        let dashScrollAcc = 0, treeTick = 0;
        let audioCtx = null, engineOsc = null, engineOsc2 = null, engineFilter = null, engineGain = null;
        let hiScore = parseInt(localStorage.getItem('car_road_hi_score')) || 0;
        let scoreHistory = JSON.parse(localStorage.getItem('car_road_history')) || [];
        let cachedAccentColor = '#ff2e92';

        // ---- Visual (canvas) state ----
        let showPlayer = true;
        let lastPlayerScreen = { x: 0, y: 0 };
        let stars = [];
        let explosionParticles = [];
        let canvasW = 0, canvasH = 0;

        const gameArea = document.getElementById('game-area');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false; // keep the pixel-art car crisp
        const boomTextEl = document.getElementById('boom-text');
        const scoreEl = document.getElementById('score'), levelEl = document.getElementById('level'), distanceEl = document.getElementById('distance'), speedEl = document.getElementById('speed');
        const startOverlay = document.getElementById('start-overlay'), gameoverOverlay = document.getElementById('gameover-overlay'), finalScoreEl = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn'), retryBtn = document.getElementById('retry-btn'), backBtn = document.getElementById('back-btn');
        const btnLeft = document.getElementById('btn-left'), btnRight = document.getElementById('btn-right');
        const hiScoreDisplay = document.getElementById('hi-score-display'), historyDisplay = document.getElementById('history-display');
        const curveArrowEl = document.getElementById('curve-arrow'), curveSTagEl = document.getElementById('curve-s-tag');

        function initGame() {
            score = 0; bonusScore = 0; distance = 0; speed = 200; level = 1; playerX = ROAD_CENTER; playerVX = 0.0; roadData = [];
            curveTheta = 0; curveTargetAmp = 0; currentAmp = 0; segmentDuration = 0; nextGateDistance = GATE_INTERVAL;
            dashScrollAcc = 0; treeTick = 0;
            lastCurveDir = 0; curveDisplayDir = 1; curveIsSNext = false;
            for (let i = 0; i < DISPLAY_ROWS; i++) roadData.push({ left: (ROAD_TOTAL_WIDTH - ROAD_START_WIDTH) / 2, width: ROAD_START_WIDTH, center: ROAD_CENTER, centerFloat: ROAD_CENTER, msg: null, tree: false });
            cachedAccentColor = '#ff2e92';
            showPlayer = true; explosionParticles = [];
            loadAndRenderScoreBoard(); updateStatus(); updateCurveIndicator(); resizeCanvas(); render();
        }

        // Road width (world units) at a given distance: starts at ROAD_START_WIDTH and narrows in
        // steps every WIDTH_STEP_M meters until it reaches ROAD_END_WIDTH, then stays constant.
        // Each step eases in over WIDTH_STEP_TRANSITION_M meters so the edges never jump onto the car.
        function getRoadWidth(dist) {
            const stepSize = (ROAD_START_WIDTH - ROAD_END_WIDTH) / WIDTH_STEP_COUNT;
            const stepIndex = Math.min(WIDTH_STEP_COUNT, Math.floor(dist / WIDTH_STEP_M));
            if (stepIndex >= WIDTH_STEP_COUNT) return ROAD_END_WIDTH;
            const widthAtStepStart = ROAD_START_WIDTH - stepIndex * stepSize;
            const distIntoStep = dist - stepIndex * WIDTH_STEP_M;
            const transitionT = Math.max(0, Math.min(1, distIntoStep / WIDTH_STEP_TRANSITION_M));
            return widthAtStepStart - transitionT * stepSize;
        }

        // Updates the on-screen "next curve" guide (arrow + optional S tag for an S-curve ahead).
        function updateCurveIndicator() {
            if (!curveArrowEl) return;
            curveArrowEl.textContent = curveDisplayDir < 0 ? '←' : '→';
            curveSTagEl.style.display = curveIsSNext ? 'inline' : 'none';
        }

        // ================= AUDIO =================

        function initAudio() {
            if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineFilter = audioCtx.createBiquadFilter(); engineFilter.type = 'lowpass'; engineFilter.frequency.setValueAtTime(150, audioCtx.currentTime);
            engineGain = audioCtx.createGain(); engineGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
            engineFilter.connect(engineGain); engineGain.connect(audioCtx.destination);
        }

        function startEngineSound() {
            if (!audioCtx) return;
            stopEngineSound();
            engineOsc = audioCtx.createOscillator(); engineOsc.type = 'sawtooth';
            engineOsc2 = audioCtx.createOscillator(); engineOsc2.type = 'square'; engineOsc2.detune.setValueAtTime(-1200, audioCtx.currentTime);
            engineOsc.connect(engineFilter); engineOsc2.connect(engineFilter);
            engineOsc.start(0); engineOsc2.start(0);
            engineGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 0.1);
        }

        function updateEngineSound() {
            if (!audioCtx || !engineOsc || !isPlaying) return;
            let baseFreq = 38 + (speed - 200) * 0.14;
            engineOsc.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.1);
            if (engineOsc2) engineOsc2.frequency.setTargetAtTime(baseFreq * 1.5, audioCtx.currentTime, 0.1);
        }

        function stopEngineSound() {
            if (engineOsc) { try { engineOsc.stop(); } catch(e) {} engineOsc.disconnect(); engineOsc = null; }
            if (engineOsc2) { try { engineOsc2.stop(); } catch(e) {} engineOsc2.disconnect(); engineOsc2 = null; }
            if (engineGain) engineGain.gain.setValueAtTime(0, audioCtx.currentTime);
        }

        // Beefed-up crash sound: low pitch-drop thump + filtered noise burst for a punchy retro "BOOM"
        function playBoomSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            const osc = audioCtx.createOscillator();
            const oscGain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(130, now);
            osc.frequency.exponentialRampToValueAtTime(22, now + 0.5);
            oscGain.gain.setValueAtTime(0.6, now);
            oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.connect(oscGain); oscGain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.5);

            const bufferSize = Math.floor(audioCtx.sampleRate * 0.4);
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.setValueAtTime(2200, now);
            noiseFilter.frequency.exponentialRampToValueAtTime(90, now + 0.4);
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.7, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            noise.start(now);
        }

        // Cheerful arcade chime when a distance gate is passed
        function playGateSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [880, 1108, 1318].forEach((freq, idx) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                const t0 = now + idx * 0.07;
                osc.frequency.setValueAtTime(freq, t0);
                gain.gain.setValueAtTime(0.0001, t0);
                gain.gain.linearRampToValueAtTime(0.25, t0 + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.16);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t0); osc.stop(t0 + 0.17);
            });
        }

        // "Insert coin" style two-tone blip on game start
        function playStartSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            [660, 990].forEach((freq, idx) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                const t0 = now + idx * 0.09;
                osc.frequency.setValueAtTime(freq, t0);
                gain.gain.setValueAtTime(0.2, t0);
                gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.12);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t0); osc.stop(t0 + 0.13);
            });
        }

        function loadAndRenderScoreBoard() {
            hiScoreDisplay.textContent = hiScore;
            let html = "HISTORY (LAST10)<br>";
            scoreHistory.forEach((s, idx) => { html += `#${idx + 1}: ${s}m<br>`; });
            historyDisplay.innerHTML = scoreHistory.length === 0 ? "HISTORY (LAST10)<br>No games yet." : html;
        }

        function updatePlayerPosition() {
            if (!isPlaying) return;
            let targetDir = (keysPressed.left ? -1 : 0) + (keysPressed.right ? 1 : 0);
            if (targetDir !== 0) {
                playerVX += targetDir * ACCEL;
                if (Math.abs(playerVX) > MAX_SPEED) playerVX = Math.sign(playerVX) * MAX_SPEED;
            } else {
                if (playerVX > 0) playerVX = Math.max(0, playerVX - DECEL);
                else if (playerVX < 0) playerVX = Math.min(0, playerVX + DECEL);
            }
            playerX = Math.max(CAR_HALF_WIDTH, Math.min(ROAD_TOTAL_WIDTH - CAR_HALF_WIDTH, playerX + playerVX));
        }

        function progressGameStep() {
            if (!isPlaying) return;
            distance += Math.floor(speed / 35);
            level = Math.floor(distance / 350) + 1; speed = Math.min(MAX_GAME_SPEED, 200 + (level - 1) * 35);

            // --- Difficulty ramp: from 300m curves get sharper/more frequent (road width is handled separately below) ---
            const difficultyT = Math.max(0, Math.min(1, (distance - DIFFICULTY_START_M) / DIFFICULTY_RAMP_M));
            // --- Road width: starts ~4x wider and narrows in steps every 500m down to the original start width ---
            const roadWidth = getRoadWidth(distance);

            if (segmentDuration <= 0) {
                const inEasyZone = distance < EASY_CURVE_ZONE_M;
                let newDir;
                if (inEasyZone) {
                    // First 1000m: gentle, single-direction curves only -- never reverse direction (no S-curves).
                    if (lastCurveDir !== 0 && Math.random() < 0.6) newDir = lastCurveDir;          // keep curving the same way
                    else if (Math.random() < 0.55) newDir = 0;                                     // or a straight stretch
                    else newDir = lastCurveDir !== 0 ? lastCurveDir : (Math.random() > 0.5 ? 1 : -1);
                    curveTargetAmp = newDir * (2 + Math.random() * 3);                              // mild amplitude, no difficulty boost
                    segmentDuration = Math.floor(60 + Math.random() * 40);                          // long, easy-going segments
                } else {
                    const ampBoost = 1 + difficultyT * 0.9;      // sharper curves as difficulty rises
                    curveTargetAmp = Math.random() < 0.75 ? (Math.random() > 0.5 ? 1 : -1) * (3 + Math.random() * 6) * ampBoost : 0;
                    segmentDuration = Math.max(14, Math.floor((35 + Math.random() * 35) * (1 - difficultyT * 0.45))); // curves change more often
                    newDir = curveTargetAmp > 0 ? 1 : (curveTargetAmp < 0 ? -1 : 0);
                }
                // --- Curve preview guide: flag an S-curve when the new direction reverses the previous one ---
                curveIsSNext = (newDir !== 0 && lastCurveDir !== 0 && newDir !== lastCurveDir);
                if (newDir !== 0) { lastCurveDir = newDir; curveDisplayDir = newDir; }
                updateCurveIndicator();
            }
            segmentDuration--;
            const lerpSpeed = 0.04 + difficultyT * 0.035; // snappier curve transitions at high difficulty
            currentAmp += (curveTargetAmp - currentAmp) * lerpSpeed;
            curveTheta += 0.04;

            // keep the curve inside the playfield, leaving room for the current (now variable) road width
            const maxAmp = ROAD_CENTER - roadWidth / 2 - 1;
            if (currentAmp > maxAmp) currentAmp = maxAmp;
            if (currentAmp < -maxAmp) currentAmp = -maxAmp;

            let nextCenterFloat = ROAD_CENTER + currentAmp;
            let lastCenterFloat = roadData[roadData.length - 1].centerFloat;
            let shift = nextCenterFloat - lastCenterFloat;
            const maxShift = 0.13 + difficultyT * 0.09;
            if (Math.abs(shift) > maxShift) nextCenterFloat = lastCenterFloat + Math.sign(shift) * maxShift;

            let leftEdge = Math.max(1, Math.min(ROAD_TOTAL_WIDTH - 1 - roadWidth, nextCenterFloat - roadWidth / 2));

            const isGate = distance >= nextGateDistance;
            const gateLabel = nextGateDistance;
            if (isGate) { nextGateDistance += GATE_INTERVAL; bonusScore += 50; playGateSound(); }

            treeTick++;
            const hasTree = (treeTick % TREE_SPACING === 0);

            roadData.push({ left: leftEdge, width: roadWidth, centerFloat: nextCenterFloat, msg: isGate ? `Run ${gateLabel}m` : null, tree: hasTree });
            roadData.shift();

            dashScrollAcc += speed / 200; // center-line scroll speed follows the current game speed
            score = distance + bonusScore;
            updateStatus();
        }

        function checkCollision() {
            if (!isPlaying) return;
            const row = roadData[0];
            // Crash only when the car's own body (not just its center point) actually crosses the road edge.
            if (playerX - CAR_HALF_WIDTH < row.left || playerX + CAR_HALF_WIDTH > row.left + row.width) gameOver();
        }

        function gameLoopRAF(timestamp) {
            if (!isPlaying) return;
            if (!lastTime) lastTime = timestamp;
            let deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            accumTime += deltaTime;
            // Cap the catch-up window (e.g. after the tab was backgrounded) to avoid a burst of ticks.
            if (accumTime > stepTime * 10) accumTime = stepTime * 10;
            // Steering AND game progression both run on this fixed-rate tick, not once per animation frame.
            // This keeps gameplay speed identical on a 60Hz phone and a 120/144Hz PC monitor;
            // only render() below scales with the display's actual refresh rate, which just adds smoothness.
            while (accumTime >= stepTime) {
                updatePlayerPosition();
                progressGameStep();
                accumTime -= stepTime;
            }
            checkCollision();
            if (isPlaying) { render(); updateEngineSound(); requestAnimationFrame(gameLoopRAF); }
        }

        function updateStatus() {
            scoreEl.textContent = score; levelEl.textContent = level; distanceEl.textContent = distance;
            speedEl.textContent = Math.min(MAX_DISPLAY_SPEED, 100 + Math.floor(distance / 12));
        }

        // ================= CANVAS RENDERING (pseudo-3D synthwave road) =================

        function initStars() {
            stars = [];
            for (let i = 0; i < 40; i++) {
                stars.push({ x: Math.random(), y: Math.random() * 0.55, r: Math.random() * 1.4 + 0.3, a: Math.random() * 0.5 + 0.3 });
            }
        }

        function resizeCanvas() {
            const rect = gameArea.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvasW = Math.max(1, rect.width);
            canvasH = Math.max(1, rect.height);
            canvas.width = Math.round(canvasW * dpr);
            canvas.height = Math.round(canvasH * dpr);
            canvas.style.width = canvasW + 'px';
            canvas.style.height = canvasH + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function drawSky(horizonY) {
            const grad = ctx.createLinearGradient(0, 0, 0, horizonY);
            grad.addColorStop(0, '#0a0420');
            grad.addColorStop(1, '#3a1568');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvasW, horizonY);

            // sun
            const sunX = canvasW / 2, sunY = horizonY, sunR = canvasW * 0.24;
            ctx.save();
            ctx.beginPath(); ctx.rect(0, 0, canvasW, horizonY); ctx.clip();
            const sunGrad = ctx.createLinearGradient(0, sunY - sunR, 0, sunY);
            sunGrad.addColorStop(0, '#ffe45e');
            sunGrad.addColorStop(0.55, '#ff8a3d');
            sunGrad.addColorStop(1, '#ff2e92');
            ctx.fillStyle = sunGrad;
            ctx.beginPath(); ctx.arc(sunX, sunY, sunR, Math.PI, 0); ctx.fill();
            ctx.strokeStyle = 'rgba(10,4,32,0.55)'; ctx.lineWidth = 3;
            for (let i = 1; i <= 4; i++) {
                const yy = sunY - sunR * 0.18 * i;
                ctx.beginPath(); ctx.moveTo(sunX - sunR, yy); ctx.lineTo(sunX + sunR, yy); ctx.stroke();
            }
            ctx.restore();

            // stars
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
                ctx.globalAlpha = s.a;
                ctx.beginPath(); ctx.arc(s.x * canvasW, s.y * horizonY, s.r, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // ground base (below horizon, behind road)
            const groundGrad = ctx.createLinearGradient(0, horizonY, 0, canvasH);
            groundGrad.addColorStop(0, '#160a30');
            groundGrad.addColorStop(1, '#05010f');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, horizonY, canvasW, canvasH - horizonY);
        }

        // 9x9 pixel-art car sprite (dot-matrix style). '.'=empty, B=body, D=shaded body, W=windshield, H=light
        const CAR_SPRITE = [
            "...BBB...",
            "..BBBBB..",
            ".BBWWWBB.",
            ".BBWWWBB.",
            ".BBBBBBB.",
            ".BBBBBBB.",
            ".BDBBBDB.",
            "HHB...BHH",
            ".H.....H."
        ];

        // halfWidthPx is the car's half-width in canvas pixels; sizing the sprite off this value
        // keeps the drawn car exactly matching the CAR_HALF_WIDTH collision box used in checkCollision().
        function drawCar(x, y, halfWidthPx) {
            const cols = CAR_SPRITE[0].length, rows = CAR_SPRITE.length;
            const px = (halfWidthPx * 2) / cols;
            const totalH = rows * px;

            ctx.save();
            ctx.shadowColor = '#ff2e92'; ctx.shadowBlur = 16;
            ctx.fillStyle = 'rgba(255,46,146,0.35)';
            ctx.fillRect(x - halfWidthPx * 1.15, y - totalH * 1.1, halfWidthPx * 2.3, totalH * 1.15);
            ctx.restore();

            ctx.save();
            ctx.translate(x - halfWidthPx, y - totalH);
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const ch = CAR_SPRITE[r][c];
                    if (ch === '.') continue;
                    ctx.fillStyle = ch === 'B' ? '#ff2e92' : ch === 'D' ? '#a8125f' : ch === 'W' ? '#00fff2' : '#ffe45e';
                    ctx.fillRect(Math.floor(c * px), Math.floor(r * px), Math.ceil(px + 0.6), Math.ceil(px + 0.6));
                }
            }
            ctx.restore();
        }

        function drawTree(x, y, scale, side) {
            const trunkW = 3.5 * scale, trunkH = 7 * scale;
            const foliageW = 15 * scale, foliageH = 15 * scale;
            const rim = side === 'left' ? 'rgba(0,255,242,0.4)' : 'rgba(255,46,146,0.4)';
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#150b12';
            ctx.fillRect(-trunkW / 2, -trunkH, trunkW, trunkH);
            ctx.strokeStyle = rim; ctx.lineWidth = Math.max(1, scale);
            ctx.fillStyle = '#0a1f15';
            for (let t = 0; t < 3; t++) {
                const w = foliageW * (1 - t * 0.22);
                const baseY = -trunkH - t * foliageH * 0.38;
                ctx.beginPath();
                ctx.moveTo(0, baseY - foliageH * 0.5);
                ctx.lineTo(w / 2, baseY);
                ctx.lineTo(-w / 2, baseY);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
            }
            ctx.restore();
        }

        function render() {
            if (!canvasW || !canvasH) return;
            ctx.clearRect(0, 0, canvasW, canvasH);

            const horizonY = canvasH * 0.14;
            drawSky(horizonY);

            const DEPTH = 22;
            // Single, consistent world-unit -> pixel scale for offsets AND widths (this used to be two different
            // magic numbers, which is why the drawn road edges didn't line up with where the crash actually triggered).
            const pxPerUnit = canvasW / ROAD_TOTAL_WIDTH;
            const projections = new Array(DISPLAY_ROWS);
            for (let i = 0; i < DISPLAY_ROWS; i++) {
                const row = roadData[i];
                const t = i / (DISPLAY_ROWS - 1);
                const d = 1 + t * DEPTH;
                const y = horizonY + (canvasH - horizonY) / d;
                const scale = 1 / d;
                // Curve visibility: with plain linear perspective (scale) a curve's sideways offset shrinks so fast
                // with distance that it's barely visible near the horizon, making the road look almost straight.
                // Using a gentler falloff (cube root) for the offset ONLY keeps the bend clearly visible far away,
                // while scale === offsetScale === 1 at the nearest row (t=0), so the row under the car -- the one
                // checkCollision() actually uses -- still renders exactly as before.
                const offsetScale = Math.cbrt(scale);
                const centerOffset = (row.centerFloat - ROAD_CENTER) * pxPerUnit * offsetScale;
                const centerX = canvasW / 2 + centerOffset;
                const halfWidth = (row.width / 2) * pxPerUnit * scale;
                projections[i] = { y, centerX, halfWidth, scale, row };
            }

            // faint perspective ground grid
            ctx.save();
            for (let i = 0; i < DISPLAY_ROWS; i += 3) {
                const p = projections[i];
                ctx.globalAlpha = 0.45 * p.scale;
                ctx.strokeStyle = 'rgba(0,255,242,0.25)';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(0, p.y); ctx.lineTo(canvasW, p.y); ctx.stroke();
            }
            ctx.globalAlpha = 1;
            [0, 0.25, 0.5, 0.75, 1].forEach(f => {
                ctx.strokeStyle = 'rgba(255,46,146,0.12)';
                ctx.beginPath(); ctx.moveTo(canvasW * f, canvasH); ctx.lineTo(canvasW / 2, horizonY); ctx.stroke();
            });
            ctx.restore();

            const dashPhase = Math.floor(dashScrollAcc);

            // road surface + roadside trees, drawn far -> near
            for (let i = DISPLAY_ROWS - 1; i >= 1; i--) {
                const far = projections[i], near = projections[i - 1];

                ctx.beginPath();
                ctx.moveTo(far.centerX - far.halfWidth, far.y);
                ctx.lineTo(far.centerX + far.halfWidth, far.y);
                ctx.lineTo(near.centerX + near.halfWidth, near.y);
                ctx.lineTo(near.centerX - near.halfWidth, near.y);
                ctx.closePath();
                ctx.fillStyle = (i % 2 === 0) ? '#170a30' : '#1e0f3d';
                ctx.fill();

                const edgeColor = (i % 4 < 2) ? '#00fff2' : '#ff2e92';
                ctx.strokeStyle = edgeColor;
                ctx.lineWidth = Math.max(1, 2 * near.scale);
                ctx.shadowColor = edgeColor; ctx.shadowBlur = 8 * near.scale;
                ctx.beginPath(); ctx.moveTo(far.centerX - far.halfWidth, far.y); ctx.lineTo(near.centerX - near.halfWidth, near.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(far.centerX + far.halfWidth, far.y); ctx.lineTo(near.centerX + near.halfWidth, near.y); ctx.stroke();
                ctx.shadowBlur = 0;

                if ((i + dashPhase) % 4 < 2) {
                    const dashHalfFar = 2 * far.scale, dashHalfNear = 2 * near.scale;
                    ctx.fillStyle = '#ffe45e';
                    ctx.beginPath();
                    ctx.moveTo(far.centerX - dashHalfFar, far.y);
                    ctx.lineTo(far.centerX + dashHalfFar, far.y);
                    ctx.lineTo(near.centerX + dashHalfNear, near.y);
                    ctx.lineTo(near.centerX - dashHalfNear, near.y);
                    ctx.closePath(); ctx.fill();
                }

                if (far.row.tree) {
                    drawTree(far.centerX - far.halfWidth - 16 * far.scale, far.y, far.scale, 'left');
                    drawTree(far.centerX + far.halfWidth + 16 * far.scale, far.y, far.scale, 'right');
                }

                if (far.row.msg) {
                    ctx.save();
                    ctx.font = `${Math.max(9, 15 * far.scale)}px 'Press Start 2P', monospace`;
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = '#ff2e92'; ctx.shadowBlur = 10;
                    ctx.fillText(far.row.msg, far.centerX, far.y);
                    ctx.restore();
                }
            }

            if (showPlayer) {
                const carX = canvasW / 2 + (playerX - ROAD_CENTER) * pxPerUnit;
                const carHalfWidthPx = CAR_HALF_WIDTH * pxPerUnit;
                const carY = canvasH - 10;
                lastPlayerScreen.x = carX; lastPlayerScreen.y = carY;
                drawCar(carX, carY, carHalfWidthPx);
            }
        }

        // ---- crash explosion ----
        function triggerExplosion(x, y) {
            explosionParticles = [];
            const colors = ['#ff2e92', '#ffe45e', '#ff8a3d', '#ffffff', '#00fff2'];
            for (let k = 0; k < 44; k++) {
                const angle = Math.random() * Math.PI * 2;
                const spd = 2 + Math.random() * 6;
                explosionParticles.push({
                    x, y,
                    vx: Math.cos(angle) * spd,
                    vy: Math.sin(angle) * spd - 2,
                    life: 1,
                    color: colors[k % colors.length],
                    size: 2 + Math.random() * 3
                });
            }
            requestAnimationFrame(explosionLoop);
        }

        function explosionLoop() {
            render();
            ctx.save();
            explosionParticles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.02;
                ctx.globalAlpha = Math.max(p.life, 0);
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            ctx.restore();
            explosionParticles = explosionParticles.filter(p => p.life > 0);
            if (explosionParticles.length > 0) requestAnimationFrame(explosionLoop);
        }

        // ================= GAME FLOW =================

        function startGame() {
            if (isPlaying) return;
            initAudio(); playStartSound(); startEngineSound(); isPlaying = true;
            startOverlay.style.display = "none"; gameoverOverlay.style.display = "none";
            startBtn.style.display = "none"; retryBtn.style.display = "none"; backBtn.style.display = "none";
            gameArea.classList.remove('crash-shake', 'crash-red', 'flash-red-animation');
            boomTextEl.classList.remove('show');
            initGame(); lastTime = 0; accumTime = 0; requestAnimationFrame(gameLoopRAF);
        }

        function gameOver() {
            isPlaying = false; stopEngineSound(); playBoomSound();
            gameArea.classList.add('crash-shake', 'flash-red-animation');

            showPlayer = false;
            triggerExplosion(lastPlayerScreen.x, lastPlayerScreen.y);

            boomTextEl.classList.remove('show');
            void boomTextEl.offsetWidth; // restart animation
            boomTextEl.classList.add('show');
            setTimeout(() => boomTextEl.classList.remove('show'), 800);

            finalScoreEl.textContent = score;
            if (score >= hiScore) { hiScore = score; localStorage.setItem('car_road_hi_score', hiScore); }
            scoreHistory.unshift(score); if (scoreHistory.length > 10) scoreHistory.pop();
            localStorage.setItem('car_road_history', JSON.stringify(scoreHistory));
            loadAndRenderScoreBoard();

            setTimeout(() => {
                gameoverOverlay.style.display = "flex";
                retryBtn.style.display = "inline-block"; backBtn.style.display = "inline-block";
            }, 550);
        }

        window.addEventListener('keydown', (e) => {
            if (["Space", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
            if (!isPlaying && e.code === "Space") startGame();
            if (e.code === "ArrowLeft") keysPressed.left = true;
            if (e.code === "ArrowRight") keysPressed.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === "ArrowLeft") keysPressed.left = false;
            if (e.code === "ArrowRight") keysPressed.right = false;
        });

        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keysPressed.left = true; btnLeft.classList.add('touch-active'); if (audioCtx) audioCtx.resume(); });
        btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); keysPressed.left = false; btnLeft.classList.remove('touch-active'); });
        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); keysPressed.right = true; btnRight.classList.add('touch-active'); if (audioCtx) audioCtx.resume(); });
        btnRight.addEventListener('touchend', (e) => { e.preventDefault(); keysPressed.right = false; btnRight.classList.remove('touch-active'); });
        startBtn.addEventListener('click', (e) => { e.target.blur(); startGame(); });
        retryBtn.addEventListener('click', (e) => { e.target.blur(); startGame(); });
        backBtn.addEventListener('click', (e) => { e.target.blur(); window.location.href = "index.html"; });

        window.addEventListener('resize', () => { resizeCanvas(); render(); });
        if (window.ResizeObserver) {
            new ResizeObserver(() => { resizeCanvas(); render(); }).observe(gameArea);
        }

        initStars();
        initGame();
    </script>
</body>
</html>
